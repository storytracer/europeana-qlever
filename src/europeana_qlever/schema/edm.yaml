        slot_uri: owl:sameAs
        range: uri
        multivalued: true
        description: >-
          The built-in OWL property owl:sameAs links an individual to an individual. Such an owl:sameAs
          statement indicates that two URI references actually refer to the same thing: the individuals
          have the same "identity".
