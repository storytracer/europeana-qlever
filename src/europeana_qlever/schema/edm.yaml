      edm_has_met:
        slot_uri: edm:hasMet
        range: uri
        multivalued: true
        description: >-
          edm:hasMet relates a resource with the objects or phenomena that have happened to or have happened
          together with the resource under consideration. We can abstractly think of history and the present
          as a series of “meetings” between people and other things in space-time. Therefore we name this
          relationship as the things the object “has met” in the course of its existence. These meetings
          are events in the proper sense, in which other people and things participate in any role.
      edm_has_type:
        slot_uri: edm:hasType
        range: string
        multivalued: true
        description: |-
          This property relates a resource with the concepts it belongs to in a suitable
          type system such as MIME or any thesaurus that captures categories of objects in a given field (e.g., the “Objects” facet in Getty’s Art and Architecture Thesaurus). It does not capture aboutness.
      edm_incorporates:
        slot_uri: edm:incorporates
        range: uri
        multivalued: true
        description: |-
          This property captures the use of some resource to add value to another
          resource. Such resources may be nested, such as performing a theater play text, and then recording the performance, or creating an artful edition of a collection of poems or just aggregating various poems in an anthology. There may be no single part that contains ultimately the incorporated object, which may be dispersed in the presentation. Therefore, incorporated resources do in general not form proper parts. Incorporated resources are not part of the same resource, but are taken from other resources, and have an independent history. Therefore edm:incorporates is not a sub-property of dcterm:hasPart.
      edm_is_derivative_of:
        slot_uri: edm:isDerivativeOf
        range: uri
        multivalued: true
        description: >-
          This property captures a narrower notion of derivation than edm:isSimilarTo, in the sense that
          it relates a resource to another one, obtained by reworking, reducing, expanding, parts or the
          whole contents of the former, and possibly adding some minor parts. Versions have an even narrower
          meaning, in that it requires common identity between the related resources. Translations, summaries,
          abstractions etc. do not qualify as versions, but do qualify as derivatives.
      edm_is_next_in_sequence:
        slot_uri: edm:isNextInSequence
        range: uri
        multivalued: true
        description: >-
          edm:isNextInSequence relates two resources S and R that are ordered parts of the same resource
          A, and such that S comes immediately after R in the order created by their being parts of A.
      edm_is_related_to:
        slot_uri: edm:isRelatedTo
        range: string
        multivalued: true
        description: |-
          edm:isRelatedTo is the most general contextual property in EDM. Contextual
          properties have typically to do either with the things that have happened to or together with the object under consideration, or what the object refers to by its shape, form or features in a figural or encoded form. For sake of simplicity, we include in the contextual relationships also the scholarly classification, which may have either to do with the role and cultural connections of the object in the past, or its kind of structure, substance or contents as it can be verified at present.
      edm_is_representation_of:
        slot_uri: edm:isRepresentationOf
        range: uri
        description: This property associates an information resource to the resource (if any) that it
          represents
      edm_is_similar_to:
        slot_uri: edm:isSimilarTo
        range: uri
        multivalued: true
        description: >-
          The most generic derivation property, covering also the case of questionable derivation. Is
          Similar To asserts that parts of the contents of one resource exhibit common features with respect
          to ideas, shapes, structures, colors, words, plots, topics with the contents of the related
          resource. Those common features may be attributed to a common origin or influence (in particular
          for derivation), but also to more generic cultural or psychological factors.
      edm_is_successor_of:
        slot_uri: edm:isSuccessorOf
        range: uri
        multivalued: true
        description: >-
          This property captures the relation between the continuation of a resource and that resource.
          This applies to a story, a serial, a journal etc. No content of the successor resource is identical
          or has a similar form with that of the precursor. The similarity is only in the context, subjects
          and figures of a plot. Successors typically form part of a common whole – such as a trilogy,
          a journal, etc.
      edm_realizes:
        slot_uri: edm:realizes
        range: uri
        multivalued: true
        description: >-
          This property describes a relation between a physical thing and the information resource that
          is contained in it, visible at it or otherwise carried by it, if applicable.
