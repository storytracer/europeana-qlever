          (http://dublincore.org/about/2009/01/05/bylaws/)
      dcterms_requires:
        slot_uri: dcterms:requires
        range: string
        multivalued: true
        description: >-
          A related resource that is required by the described resource to support its function, delivery
          or coherence. Example: http://ads.ahds.ac.uk/project/userinfo/css/oldbrowsers.css where the
          resource described is a HTML file at http://ads.ahds.ac.uk/project/userinfo/digitalTextArchiving.html
      dcterms_spatial:
        slot_uri: dcterms:spatial
        range: string
        multivalued: true
        description: 'Spatial characteristics of the resource. Example: Portugal'
      dcterms_table_of_contents:
        slot_uri: dcterms:tableOfContents
        range: string
        multivalued: true
        description: 'A list of subunits of the resource. Example: Chapter 1. Introduction, Chapter 2.
          History'
      dcterms_temporal:
        slot_uri: dcterms:temporal
        range: string
        multivalued: true
        description: 'Temporal characteristics of the resource Example: Roman'
      edm_current_location:
        slot_uri: edm:currentLocation
        range: string
        description: >-
          The geographic location and/or name of the repository, building, site, or other entity whose
          boundaries presently include the resource.
      edm_has_met:
        slot_uri: edm:hasMet
        range: uri
        multivalued: true
        description: >-
          edm:hasMet relates a resource with the objects or phenomena that have happened to or have happened
          together with the resource under consideration. We can abstractly think of history and the present
          as a series of “meetings” between people and other things in space-time. Therefore we name this
          relationship as the things the object “has met” in the course of its existence. These meetings
          are events in the proper sense, in which other people and things participate in any role.
      edm_has_type:
        slot_uri: edm:hasType
        range: string
        multivalued: true
        description: |-
          This property relates a resource with the concepts it belongs to in a suitable
          type system such as MIME or any thesaurus that captures categories of objects in a given field (e.g., the “Objects” facet in Getty’s Art and Architecture Thesaurus). It does not capture aboutness.
      edm_incorporates:
        slot_uri: edm:incorporates
        range: uri
        multivalued: true
        description: |-
          This property captures the use of some resource to add value to another
          resource. Such resources may be nested, such as performing a theater play text, and then recording the performance, or creating an artful edition of a collection of poems or just aggregating various poems in an anthology. There may be no single part that contains ultimately the incorporated object, which may be dispersed in the presentation. Therefore, incorporated resources do in general not form proper parts. Incorporated resources are not part of the same resource, but are taken from other resources, and have an independent history. Therefore edm:incorporates is not a sub-property of dcterm:hasPart.
      edm_is_derivative_of:
        slot_uri: edm:isDerivativeOf
        range: uri
        multivalued: true
        description: >-
          This property captures a narrower notion of derivation than edm:isSimilarTo, in the sense that
          it relates a resource to another one, obtained by reworking, reducing, expanding, parts or the
          whole contents of the former, and possibly adding some minor parts. Versions have an even narrower
          meaning, in that it requires common identity between the related resources. Translations, summaries,
          abstractions etc. do not qualify as versions, but do qualify as derivatives.
      edm_is_next_in_sequence:
        slot_uri: edm:isNextInSequence
        range: uri
        multivalued: true
        description: >-
          edm:isNextInSequence relates two resources S and R that are ordered parts of the same resource
          A, and such that S comes immediately after R in the order created by their being parts of A.
      edm_is_related_to:
        slot_uri: edm:isRelatedTo
        range: string
        multivalued: true
        description: |-
          edm:isRelatedTo is the most general contextual property in EDM. Contextual
          properties have typically to do either with the things that have happened to or together with the object under consideration, or what the object refers to by its shape, form or features in a figural or encoded form. For sake of simplicity, we include in the contextual relationships also the scholarly classification, which may have either to do with the role and cultural connections of the object in the past, or its kind of structure, substance or contents as it can be verified at present.
      edm_is_representation_of:
        slot_uri: edm:isRepresentationOf
        range: uri
        description: This property associates an information resource to the resource (if any) that it
          represents
      edm_is_similar_to:
        slot_uri: edm:isSimilarTo
        range: uri
        multivalued: true
        description: >-
          The most generic derivation property, covering also the case of questionable derivation. Is
          Similar To asserts that parts of the contents of one resource exhibit common features with respect
          to ideas, shapes, structures, colors, words, plots, topics with the contents of the related
          resource. Those common features may be attributed to a common origin or influence (in particular
          for derivation), but also to more generic cultural or psychological factors.
      edm_is_successor_of:
        slot_uri: edm:isSuccessorOf
        range: uri
        multivalued: true
        description: >-
          This property captures the relation between the continuation of a resource and that resource.
          This applies to a story, a serial, a journal etc. No content of the successor resource is identical
          or has a similar form with that of the precursor. The similarity is only in the context, subjects
          and figures of a plot. Successors typically form part of a common whole – such as a trilogy,
          a journal, etc.
      edm_realizes:
        slot_uri: edm:realizes
        range: uri
        multivalued: true
        description: >-
          This property describes a relation between a physical thing and the information resource that
          is contained in it, visible at it or otherwise carried by it, if applicable.
      edm_pid:
        slot_uri: edm:pid
        range: string
        multivalued: true
        description: A persistent identifier (PID) assigned to the resource, such as a DOI, Handle, or
          ARK.
      edm_europeana_proxy:
        slot_uri: edm:europeanaProxy
        range: boolean
        description: >-
          This property serves only as a flag to indicate that a proxy is a Europeana proxy (as opposed
          to a provider proxy).  It is for internal use only.
      edm_user_tag:
        slot_uri: edm:userTag
        range: string
        multivalued: true
        description: This is a tag created by a user through the Europeana interface.
      edm_year:
        slot_uri: edm:year
        range: string
        multivalued: true
        description: |-
          A point of time associated with an event in the life of the original analog or
          born digital object.
      ore_proxy_for:
        slot_uri: ore:proxyFor
        range: uri
        description: >-
          Proxy objects are used to represent a Resource as it is aggregated in a particular Aggregation.
          The ore:proxyFor relationship is used to link the proxy to the Aggregated Resource it is a proxy
          for. The subject of the relationship is a Proxy object, and the object of the relationship is
          the Aggregated Resource.
      ore_proxy_in:
        slot_uri: ore:proxyIn
        range: uri
        multivalued: true
        description: >-
          Proxy objects must link to the Aggregation in which the resource being proxied is aggregated.
          The ore:proxyIn relationship is used for this purpose. The subject of the relationship is a
          Proxy object, and the object of the relationship is the Aggregation.
      ore_lineage:
        slot_uri: ore:lineage
        range: uri
        multivalued: true
        description: >-
          ore:lineage is a relationship between two Proxy objects, both of which MUST have the same Resource
          for which they are proxies. The meaning is that the Resource for which the subject of the relationship
          is a Proxy was discovered in the Aggregation in which the object Proxy's resource is aggregated.
      edm_type:
        slot_uri: edm:type
        range: EdmType
        description: The Europeana material type of the resource
      owl_same_as:
        slot_uri: owl:sameAs
        range: uri
        multivalued: true
        description: >-
          The built-in OWL property owl:sameAs links an individual to an individual. Such an owl:sameAs
          statement indicates that two URI references actually refer to the same thing: the individuals
          have the same "identity".
  Aggregation:
    class_uri: ore:Aggregation
    description: >-
      A set of related resources (Aggregated Resources), grouped together such that the set can be treated
      as a single resource. This is the entity described within the ORE interoperability framework by
      a Resource Map.
    attributes:
      edm_aggregated_cho:
        slot_uri: edm:aggregatedCHO
        range: uri
        required: true
        description: >-
          This property associates an ORE aggregation with the cultural heritage object(s) (CHO for short)
          it is about.
      edm_data_provider:
        slot_uri: edm:dataProvider
        range: string
        description: >-
          The name or identifier of the organisation who contributes data indirectly to an aggregation
          service (e.g. Europeana).
      edm_has_view:
        slot_uri: edm:hasView
        range: uri
        multivalued: true
        description: |-
          This property relates a ORE aggregation about a CHO with a web resource
          providing a view of that CHO. Examples of view are: a thumbnail, a textual
          abstract and a table of contents. The ORE aggregation may be a Europeana
          Aggregation, in which case the view is an object owned by Europeana (i.e., an instance of edm:EuropeanaObject) or an aggregation contributed by a content provider. In order to capture both these cases, the domain of edm:hasView is ore:Aggregation and its range is edm:WebResource
      edm_is_shown_at:
        slot_uri: edm:isShownAt
        range: uri
        description: >-
          An unambiguous URL reference to the digital object on the provider’s web site in its full information
          context.
      edm_is_shown_by:
        slot_uri: edm:isShownBy
        range: uri
        description: >-
          An unambiguous URL reference to the digital object on the provider’s web site in the best available
          resolution/quality.
      edm_object:
        slot_uri: edm:object
        range: uri
        description: |-
          The URL of a thumbnail representing the digital object or, if there is no such
          thumbnail, the URL of the digital object in the best resolution available on the
          web site of the data provider from which a thumbnail could be generated. This will often be the same URL as given in edm:isShownBy.
      edm_provider:
        slot_uri: edm:provider
        range: string
        required: true
        description: >-
          The name or identifier of the organization who delivers data directly to an aggregation service
          (e.g. Europeana)
      dc_rights:
        slot_uri: dc:rights
        range: string
        multivalued: true
        description: >-
          Information about copyright of the original object. Example: Creative Commons Attribution 3.0
          License
      edm_rights:
        slot_uri: edm:rights
        range: uri
        required: true
        description: |-
          Information about copyright of the digital object as specified by isShownBy
          and isShownAt
      edm_ugc:
        slot_uri: edm:ugc
        range: string
        description: >-
          This element is used to identify user generated content (also called user created content).  It
          should be applied to all digitised or born digital content contributed by the general public
          and collected by Europeana through a crowdsourcing initiative or project.
      edm_intermediate_provider:
        slot_uri: edm:intermediateProvider
        range: string
        multivalued: true
        description: >-
          The name or identifier of the intermediate organization that selects, collates, or curates data
          from a Data Provider that is then aggregated by a Provider from which Europeana harvests. The
          Intermedatiate Provider must be distinct from both the Data Provider and the Provider in the
          data supply chain. Example: <edm:intermediateProvider< Erfgoedplus.be</edm:intermediateProvider<
          <edm:intermediateProvider rdf:resource=”www.erfgoedplus.be/”/<
      dqv_has_quality_annotation:
        slot_uri: dqv:hasQualityAnnotation
        range: string
        multivalued: true
        description: 'The identifier of the Quality annotation. Example: <dqv:hasQualityAnnotation/>'
      dcterms_created:
        slot_uri: dcterms:created
        range: string
        description: 'Date of creation of the resource Example: 1564 Iron Age'
      dcterms_modified:
        slot_uri: dcterms:modified
        range: string
        description: Modified Date
  WebResource:
    class_uri: edm:WebResource
    description: |-
      Information Resources that have at least one Web Representation and at least
      a URI.
    attributes:
      edm_pid:
        slot_uri: edm:pid
        range: string
        multivalued: true
        description: A persistent identifier (PID) assigned to the resource, such as a DOI, Handle, or
          ARK.
      dc_creator:
        slot_uri: dc:creator
        range: string
        multivalued: true
        description: >-
          An entity primarily responsible for making the resource. This may be a person, organisation
          or a service. Example: Shakespeare, William
      dc_description:
        slot_uri: dc:description
        range: string
        multivalued: true
        description: >-
          An account of the resource. Example: Illustrated guide to airport markings and lighting signals,
          with particular reference to SMGCS (Surface Movement Guidance and Control System) for airports
          with low visibility conditions.
      dc_format:
        slot_uri: dc:format
        range: string
        multivalued: true
        description: 'The file format, physical medium or dimensions of the resource. Example: image/jpeg'
      dc_rights:
        slot_uri: dc:rights
        range: string
        multivalued: true
        description: >-
          Information about copyright of the original object. Example: Creative Commons Attribution 3.0
          License
      dc_source:
        slot_uri: dc:source
        range: string
        multivalued: true
        description: >-
          A related resource from which the described resource is derived in whole or in part. Example:
          Security Magazine pp 3-12 BAM portal
      dc_type:
        slot_uri: dc:type
        range: string
        multivalued: true
        description: >-
          The nature or genre of the resource. Type includes terms describing general categories, functions,
          genres, or aggregation levels for content. Example: painting photograph coin
      dc_title:
        slot_uri: dc:title
        range: string
        multivalued: true
        description: >-
          A name given to the resource. Typically, a Title will be a name by which the resource is formally
          known. Example: Taal vitaal
      dc_language:
        slot_uri: dc:language
        range: string
        multivalued: true
        description: 'A language of the resource. Example: it'
      dcterms_conforms_to:
        slot_uri: dcterms:conformsTo
        range: string
        multivalued: true
        description: >-
          An established standard to which the described resource conforms. Example: W3C WCAG 2.0 (for
          an HTML document that conforms to web content accessibility guidelines).
      dcterms_created:
        slot_uri: dcterms:created
        range: string
        multivalued: true
        description: 'Date of creation of the resource Example: 1564 Iron Age'
      dcterms_extent:
        slot_uri: dcterms:extent
        range: string
        multivalued: true
        description: >-
          The size or duration of the resource. Example: 13 cm (the width of an original object). 34 minutes
          (the length of an audio file).
      dcterms_has_part:
        slot_uri: dcterms:hasPart
        range: string
        multivalued: true
        description: A related resource that is included either physically or logically in the described
          resource.
      dcterms_is_format_of:
        slot_uri: dcterms:isFormatOf
        range: string
        multivalued: true
        description: >-
          A related resource that is substantially the same as the described resource, but in another
          format. Example: Europeana_logo.tiff where the resource being described is a png image file.
      dcterms_is_part_of:
        slot_uri: dcterms:isPartOf
        range: string
        multivalued: true
        description: A related resource in which the described resource is physically or logically included.
      dcterms_issued:
        slot_uri: dcterms:issued
        range: string
        multivalued: true
        description: 'Date of formal issuance (e.g., publication) of the resource. Example: 1993'
      dcterms_temporal:
        slot_uri: dcterms:temporal
        range: string
        multivalued: true
        description: 'Temporal characteristics of the resource Example: Roman'
      edm_is_next_in_sequence:
        slot_uri: edm:isNextInSequence
        range: uri
        description: >-
          edm:isNextInSequence relates two resources S and R that are ordered parts of the same resource
          A, and such that S comes immediately after R in the order created by their being parts of A.
      edm_rights:
        slot_uri: edm:rights
        range: uri
        description: |-
          Information about copyright of the digital object as specified by isShownBy
          and isShownAt
      owl_same_as:
        slot_uri: owl:sameAs
        range: uri
        multivalued: true
        description: >-
          The built-in OWL property owl:sameAs links an individual to an individual. Such an owl:sameAs
          statement indicates that two URI references actually refer to the same thing: the individuals
          have the same "identity".
      rdf_type:
        slot_uri: rdf:type
        range: uri
        description: To indicate the type of a resource. Currently not used
      edm_codec_name:
        slot_uri: edm:codecName
        range: string
        description: >-
          The name of a device or computer program capable of encoding or decoding a digital data stream
          or signal (i.e. coder-decoder). Example: mp4v
      ebucore_has_mime_type:
        slot_uri: ebucore:hasMimeType
        range: string
        description: >-
          The main MIME types as defined by IANA: e.g. audio, video, text, application, or a container
          MIME type. Example: video/mp4
      ebucore_file_byte_size:
        slot_uri: ebucore:fileByteSize
        range: integer
        description: 'The size of a Media Resource expressed in bytes. Example: 39508'
      ebucore_duration:
        slot_uri: ebucore:duration
        range: string
        description: 'The duration of a track or a signal expressed in ms. Example: 270000'
      ebucore_width:
        slot_uri: ebucore:width
        range: integer
        description: 'The width of e.g. a video frame typically expressed as a number of pixels. Example:
          1024'
      ebucore_height:
        slot_uri: ebucore:height
        range: integer
        description: 'The height of e.g. a video frame typically expressed as a number of pixels. Example:
          768'
      edm_spatial_resolution:
        slot_uri: edm:spatialResolution
        range: integer
        description: 'The spatial resolution of a media resource expressed in DPIs. Example: 300'
      ebucore_sample_size:
        slot_uri: ebucore:sampleSize
        range: integer
        description: 'The size of an audio sample in bits. Also called bit depth. Example: 16'
      ebucore_sample_rate:
        slot_uri: ebucore:sampleRate
        range: integer
        description: 'The frequency at which an audio is sampled per second. Also called sampling rate.
          Example: 44100'
      ebucore_bit_rate:
        slot_uri: ebucore:bitRate
        range: integer
        description: 'To provide the bitrate at which the Media Resource can be played in bits per second.
          Example: 128000'
      ebucore_frame_rate:
        slot_uri: ebucore:frameRate
        range: float
        description: 'The frame rate of the video signal in frames per second. Example: 300'
      edm_has_color_space:
        slot_uri: edm:hasColorSpace
        range: string
        description: 'The color space of an image resource i.e. ''grayscale'' or ''sRGB''. Example: grayscale'
      edm_component_color:
        slot_uri: edm:componentColor
        range: string
        multivalued: true
        description: >-
          A significant color present in an image. The colors must be taken from the CSS3 standard color
          palette and are expressed as a hexadecimal binary value. Example: <spatialResolution>FF0000</spatialResolution>
      edm_point_count:
        slot_uri: edm:pointCount
        range: integer
        description: the number of points in the 3D model
      edm_polygon_count:
        slot_uri: edm:polygonCount
        range: integer
        description: the number of polygons in the 3D model
      edm_vertex_count:
        slot_uri: edm:vertexCount
        range: integer
        description: the number of vertices in the 3D model
      rdfs_see_also:
        slot_uri: rdfs:seeAlso
        range: uri
        multivalued: true
        description: A resource that provides further information about the subject resource.
      ebucore_orientation:
        slot_uri: ebucore:orientation
        range: string
        description: 'The orientation of a document or an image. Example: landscape'
      ebucore_audio_channel_number:
        slot_uri: ebucore:audioChannelNumber
        range: integer
        description: 'The total number of audio channels contained in the Media Resource. Example: 2'
      dcterms_is_referenced_by:
        slot_uri: dcterms:isReferencedBy
        range: string
        multivalued: true
        description: >-
          A related resource that references, cites, or otherwise points to the described resource. Example:
          Till, Nicholas (1994) Mozart and the Enlightenment: Truth, Virtue and Beauty in Mozart's Operas,
          W. W. Norton & Company
      edm_preview:
        slot_uri: edm:preview
        range: uri
        description: The URL of a thumbnail representing the digital object, generated by Europeana.
      svcs_has_service:
        slot_uri: svcs:has_service
        range: uri
        multivalued: true
        description: >-
          The identifier of the Service require to consume the WebResource. <svcs:has_service rdf:resource=“http://www.example.org/Service/IIIF”>
      edm_type:
        slot_uri: edm:type
        range: EdmType
        description: The Europeana material type of the resource
      schema_digital_source_type:
        slot_uri: schema:digitalSourceType
        range: uri
        description: >-
          The type of digital source used to create the digital object. Indicates whether the content
          is digitised from an analogue original, born-digital, or created through other digital processes.
      edm_intended_usage:
        slot_uri: edm:intendedUsage
        range: uri
        multivalued: true
        description: The intended usage context for a web resource, such as thumbnail or full resolution.
      edm_is_representation_of:
        slot_uri: edm:isRepresentationOf
        range: uri
        multivalued: true
        description: This property associates an information resource to the resource (if any) that it
          represents
  Agent:
    class_uri: edm:Agent
    description: |-
      This class comprises people, either individually or in groups, who have the
      potential to perform intentional actions for which they can be held responsible.
    attributes:
      skos_pref_label:
        slot_uri: skos:prefLabel
        range: string
        multivalued: true
        description: >-
          A resource has no more than one value of skos:prefLabel per language tag, and no more than one
          value of skos:prefLabel without language tag.
      skos_alt_label:
        slot_uri: skos:altLabel
        range: string
        multivalued: true
        description: The range of skos:altLabel is the class of RDF plain literals.
      skos_hidden_label:
        slot_uri: skos:hiddenLabel
        range: string
        multivalued: true
        description: The range of skos:hiddenLabel is the class of RDF plain literals.
      skos_note:
        slot_uri: skos:note
        range: string
        multivalued: true
        description: A general note, for any purpose.
      dc_date:
        slot_uri: dc:date
        range: string
        multivalued: true
        description: >-
          A point or period of time associated with an event in the lifecycle of the resource. Example:
          17th century (For example the date when an object was repaired)
      dc_identifier:
        slot_uri: dc:identifier
        range: string
        multivalued: true
        description: identifier
      dcterms_has_part:
        slot_uri: dcterms:hasPart
        range: string
        multivalued: true
        description: A related resource that is included either physically or logically in the described
          resource.
      dcterms_is_part_of:
        slot_uri: dcterms:isPartOf
        range: string
        multivalued: true
        description: A related resource in which the described resource is physically or logically included.
      edm_begin:
        slot_uri: edm:begin
        range: string
        description: This property denotes the start date of a period of time.
      edm_end:
        slot_uri: edm:end
        range: string
        description: This property denotes the end date of a period of time.
      edm_has_met:
        slot_uri: edm:hasMet
        range: uri
        multivalued: true
        description: >-
          edm:hasMet relates a resource with the objects or phenomena that have happened to or have happened
          together with the resource under consideration. We can abstractly think of history and the present
          as a series of “meetings” between people and other things in space-time. Therefore we name this
          relationship as the things the object “has met” in the course of its existence. These meetings
          are events in the proper sense, in which other people and things participate in any role.
      edm_is_related_to:
        slot_uri: edm:isRelatedTo
        range: string
        multivalued: true
        description: |-
          edm:isRelatedTo is the most general contextual property in EDM. Contextual
          properties have typically to do either with the things that have happened to or together with the object under consideration, or what the object refers to by its shape, form or features in a figural or encoded form. For sake of simplicity, we include in the contextual relationships also the scholarly classification, which may have either to do with the role and cultural connections of the object in the past, or its kind of structure, substance or contents as it can be verified at present.
      foaf_name:
        slot_uri: foaf:name
        range: string
        multivalued: true
        description: A name for some thing.
      rdaGr2_biographical_information:
        slot_uri: rdaGr2:biographicalInformation
        range: string
        multivalued: true
        description: An account of the life of the person.
      rdaGr2_date_of_birth:
        slot_uri: rdaGr2:dateOfBirth
        range: string
        description: The date of birth of the person.
      rdaGr2_date_of_death:
        slot_uri: rdaGr2:dateOfDeath
        range: string
        description: The date of death of the person.
      rdaGr2_date_of_establishment:
        slot_uri: rdaGr2:dateOfEstablishment
        range: string
        description: The date of establishment of the corporate body.
      rdaGr2_date_of_termination:
        slot_uri: rdaGr2:dateOfTermination
        range: string
        description: The date of termination of the corporate body.
      rdaGr2_gender:
        slot_uri: rdaGr2:gender
        range: string
        description: The gender with which a person identifies.
      rdaGr2_place_of_birth:
        slot_uri: rdaGr2:placeOfBirth
        range: string
        multivalued: true
        description: The town, city, province, state, and/or country in which a person was born.
