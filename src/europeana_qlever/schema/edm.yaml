    description: >-
      A Proxy represents an Aggregated Resource as it exists in a specific Aggregation. All assertions
      made about an entity are globally true, not only within the context of the Aggregation. As such,
      in order to make assertions which are only true of a resource as it exists in an Aggregation, a
      Proxy object is required. For example, one might want to cite an article as it appears in a specific
      journal, or assign aggregation-specific metadata to a Resource.
