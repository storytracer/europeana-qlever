id: https://europeana.eu/schemas/edm-parquet
name: edm_parquet
title: Europeana EDM → Parquet Export Schema
description: >-
  Fully declarative export schema for the europeana-qlever pipeline.
  Every export table is a LinkML class with annotations that specify
  SPARQL generation, DuckDB composition, PyArrow types, and export set
  membership.  Adding a new export requires only editing this file —
  no Python code changes.

version: "0.2.0"

prefixes:
  linkml: https://w3id.org/linkml/
  cc: http://creativecommons.org/ns#
  dcat: http://www.w3.org/ns/dcat#
  dc: http://purl.org/dc/elements/1.1/
  dcterms: http://purl.org/dc/terms/
  doap: http://usefulinc.com/ns/doap#
  dqv: http://www.w3.org/ns/dqv#
  ebucore: http://www.ebu.ch/metadata/ontologies/ebucore/ebucore#
  edm: http://www.europeana.eu/schemas/edm/
  foaf: http://xmlns.com/foaf/0.1/
  odrl: http://www.w3.org/ns/odrl/2/
  ore: http://www.openarchives.org/ore/terms/
  owl: http://www.w3.org/2002/07/owl#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  rdaGr2: http://rdvocab.info/ElementsGr2/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  svcs: http://rdfs.org/sioc/services#
  wgs84_pos: http://www.w3.org/2003/01/geo/wgs84_pos#
  xsd: http://www.w3.org/2001/XMLSchema#

default_range: string

imports:
  - linkml:types
  - ./edm

# ===================================================================
# Enums
# ===================================================================

enums:
  ProxyType:
    permissible_values:
      provider: { description: "Provider proxy (original metadata)" }
      europeana: { description: "Europeana proxy (normalised enrichments)" }

  RdfSource:
    permissible_values:
      proxy: { description: "ore:Proxy triple pattern" }
      aggregation: { description: "ore:Aggregation triple pattern" }
      europeana_aggregation: { description: "edm:EuropeanaAggregation triple pattern" }
      web_resource: { description: "edm:WebResource triple pattern" }

  ReuseLevel:
    permissible_values:
      open: { description: "CC0, CC-BY, CC-BY-SA, CC public domain" }
      restricted: { description: "CC-NC/ND variants, select RightsStatements.org" }
      prohibited: { description: "InC, CNE, NKC, UND, and other non-reuse" }

  EdmType:
    permissible_values:
      IMAGE: {}
      TEXT: {}
      SOUND: {}
      VIDEO: {}
      3D: {}

# ===================================================================
# Structured types (nested Parquet column types)
# ===================================================================

classes:

  LangValue:
    description: >-
      A string value with its language tag. Used for titles and descriptions.
      Maps to Parquet STRUCT<value VARCHAR, lang VARCHAR>.
    attributes:
      value:
        range: string
        required: true
      lang:
        range: string

  LabeledEntity:
    description: >-
      An entity reference with a resolved label and its URI.
      Maps to Parquet STRUCT<label VARCHAR, uri VARCHAR>.
      Used for subjects, dc_types, formats.
    attributes:
      label:
        range: string
        required: true
      uri:
        range: uri

  NamedEntity:
    description: >-
      An agent/person reference with a resolved display name and its URI.
      Maps to Parquet STRUCT<name VARCHAR, uri VARCHAR>.
      Used for creators, contributors, publishers.
    attributes:
      name:
        range: string
        required: true
      uri:
        range: uri

  # =================================================================
  # Item — the items_resolved Parquet schema (composite export)
  # =================================================================

  Item:
    description: >-
      Fully resolved one-row-per-item export. This is the schema of
      items_resolved.parquet — the flagship denormalized export.
    class_uri: edm:ProvidedCHO
    annotations:
      export_name: items_resolved
      export_type: composite
      export_sets: "pipeline,items"

    attributes:
      # -- Identifier --
      item:
        slot_uri: edm:ProvidedCHO
        range: uri
        required: true
        identifier: true
        annotations:
          rdf_source: aggregation

      # -- Single-valued from Europeana proxy --
      type:
        slot_uri: edm:type
        range: EdmType
        required: true
        annotations:
          rdf_source: proxy
          proxy_source: europeana

      # -- Single-valued from aggregation --
      country:
        slot_uri: edm:country
        required: true
        annotations:
          rdf_source: europeana_aggregation

      institution:
        slot_uri: edm:dataProvider
        required: true
        annotations:
          sparql_variable: dataProvider
          rdf_source: aggregation

      aggregator:
        slot_uri: edm:provider
        required: true
        annotations:
          sparql_variable: provider
          rdf_source: aggregation

      rights:
        slot_uri: edm:rights
        range: uri
        required: true
        annotations:
          rdf_source: aggregation

      reuse_level:
        range: ReuseLevel
        annotations:
          computed: "true"
        description: >-
          Derived from edm:rights URI via pattern matching.
          open / restricted / prohibited.

      completeness:
        slot_uri: edm:completeness
        range: integer
        annotations:
          rdf_source: europeana_aggregation

      is_shown_at:
        slot_uri: edm:isShownAt
        range: uri
        annotations:
          sparql_variable: isShownAt
          rdf_source: aggregation

      is_shown_by:
        slot_uri: edm:isShownBy
        range: uri
        annotations:
          sparql_variable: isShownBy
          rdf_source: aggregation

      preview:
        slot_uri: edm:preview
        range: uri
        annotations:
          rdf_source: europeana_aggregation

      landing_page:
        slot_uri: edm:landingPage
        range: uri
        annotations:
          sparql_variable: landingPage
          rdf_source: europeana_aggregation

      dataset_name:
        slot_uri: edm:datasetName
        annotations:
          sparql_variable: datasetName
          rdf_source: europeana_aggregation

      # -- Multi-valued: lang-tagged (LangValue) --
      titles:
        slot_uri: dc:title
        range: LangValue
        multivalued: true
        annotations:
          base_table: items_titles
          rdf_source: proxy
          proxy_source: provider
          query_pattern: lang_tagged

      descriptions:
        slot_uri: dc:description
        range: LangValue
        multivalued: true
        annotations:
          base_table: items_descriptions
          rdf_source: proxy
          proxy_source: provider
          query_pattern: lang_tagged

      # -- Multi-valued: NamedEntity (agent-resolved) --
      creators:
        slot_uri: dc:creator
        range: NamedEntity
        multivalued: true
        annotations:
          base_table: items_creators
          rdf_source: proxy
          proxy_source: provider
          query_pattern: iri_or_literal
          entity_resolved: agents

      contributors:
        slot_uri: dc:contributor
        range: NamedEntity
        multivalued: true
        annotations:
          base_table: items_contributors
          rdf_source: proxy
          proxy_source: provider
          query_pattern: iri_or_literal
          entity_resolved: agents

      publishers:
        slot_uri: dc:publisher
        range: NamedEntity
        multivalued: true
        annotations:
          base_table: items_publishers
          rdf_source: proxy
          proxy_source: provider
          query_pattern: iri_or_literal
          entity_resolved: agents

      # -- Multi-valued: LabeledEntity (concept-resolved) --
      subjects:
        slot_uri: dc:subject
        range: LabeledEntity
        multivalued: true
        annotations:
          base_table: items_subjects
          rdf_source: proxy
          proxy_source: provider
          query_pattern: iri_or_literal
          entity_resolved: concepts

      dc_types:
        slot_uri: dc:type
        range: LabeledEntity
        multivalued: true
        annotations:
          base_table: items_dc_types
          rdf_source: proxy
          proxy_source: provider
          query_pattern: iri_or_literal
          entity_resolved: concepts

      formats:
        slot_uri: dc:format
        range: LabeledEntity
        multivalued: true
        annotations:
          base_table: items_formats
          rdf_source: proxy
          proxy_source: provider
          query_pattern: iri_or_literal
          entity_resolved: concepts

      # -- Multi-valued: simple string lists --
      dates:
        slot_uri: dc:date
        multivalued: true
        annotations:
          base_table: items_dates
          rdf_source: proxy
          proxy_source: provider
          query_pattern: simple_literal

      years:
        slot_uri: edm:year
        multivalued: true
        annotations:
          base_table: items_years
          rdf_source: proxy
          proxy_source: europeana
          query_pattern: simple_literal

      languages:
        slot_uri: dc:language
        multivalued: true
        annotations:
          base_table: items_languages
          rdf_source: proxy
          proxy_source: provider
          query_pattern: simple_literal

      identifiers:
        slot_uri: dc:identifier
        multivalued: true
        annotations:
          base_table: items_identifiers
          rdf_source: proxy
          proxy_source: provider
          query_pattern: simple_literal

      dc_rights:
        slot_uri: dc:rights
        multivalued: true
        annotations:
          base_table: items_dc_rights
          rdf_source: proxy
          proxy_source: provider
          query_pattern: simple_literal

      # -- Web resource scalars --
      mime_type:
        slot_uri: ebucore:hasMimeType
        annotations:
          sparql_variable: mime
          rdf_source: web_resource

      width:
        slot_uri: ebucore:width
        range: integer
        annotations:
          rdf_source: web_resource

      height:
        slot_uri: ebucore:height
        range: integer
        annotations:
          rdf_source: web_resource

      file_bytes:
        slot_uri: ebucore:fileByteSize
        range: integer
        annotations:
          sparql_variable: bytes
          rdf_source: web_resource

      has_iiif:
        slot_uri: svcs:has_service
        range: boolean
        annotations:
          sparql_variable: has_service
          rdf_source: web_resource
          computed: "true"

  # =================================================================
  # Entity classes
  # =================================================================

  Agent:
    description: Contextual entity representing a person or organisation.
    class_uri: edm:Agent
    annotations:
      export_type: entity
      export_name_core: agents_core
      export_name_links: agents_links
      export_sets: "pipeline,entities"
      id_column: agent
      link_properties: >-
        alt_label=skos:altLabel+lang,
        same_as=owl:sameAs,
        profession=rdaGr2:professionOrOccupation+lang,
        note=skos:note+lang,
        identifier=dc:identifier,
        name=foaf:name+lang,
        biographical_info=rdaGr2:biographicalInformation+lang
    attributes:
      agent:
        range: uri
        required: true
        identifier: true
      pref_label:
        slot_uri: skos:prefLabel
        required: true
      pref_label_lang:
        description: Language tag of pref_label
      date_of_birth:
        slot_uri: rdaGr2:dateOfBirth
      date_of_death:
        slot_uri: rdaGr2:dateOfDeath
      date_of_establishment:
        slot_uri: rdaGr2:dateOfEstablishment
      date_of_termination:
        slot_uri: rdaGr2:dateOfTermination
      gender:
        slot_uri: rdaGr2:gender
      place_of_birth:
        slot_uri: rdaGr2:placeOfBirth
      place_of_death:
        slot_uri: rdaGr2:placeOfDeath
      begin:
        slot_uri: edm:begin
      end:
        slot_uri: edm:end

  Concept:
    description: Contextual entity representing a SKOS concept.
    class_uri: skos:Concept
    annotations:
      export_type: entity
      export_name_core: concepts_core
      export_name_links: concepts_links
      export_sets: "pipeline,entities"
      id_column: concept
      link_properties: >-
        alt_label=skos:altLabel+lang,
        broader=skos:broader,
        narrower=skos:narrower,
        related=skos:related,
        exact_match=skos:exactMatch,
        close_match=skos:closeMatch,
        broad_match=skos:broadMatch,
        narrow_match=skos:narrowMatch,
        related_match=skos:relatedMatch,
        note=skos:note+lang,
        notation=skos:notation
    attributes:
      concept:
        range: uri
        required: true
        identifier: true
      pref_label:
        slot_uri: skos:prefLabel
        required: true
      pref_label_lang:
        description: Language tag of pref_label
      scheme:
        slot_uri: skos:inScheme
        range: uri

  Place:
    description: Contextual entity representing a geographic location.
    class_uri: edm:Place
    annotations:
      export_type: entity
      export_name_core: places_core
      export_name_links: places_links
      export_sets: "pipeline,entities"
      id_column: place
      link_properties: >-
        alt_label=skos:altLabel+lang,
        same_as=owl:sameAs,
        note=skos:note+lang,
        is_part_of=dcterms:isPartOf,
        has_part=dcterms:hasPart
    attributes:
      place:
        range: uri
        required: true
        identifier: true
      pref_label:
        slot_uri: skos:prefLabel
        required: true
      pref_label_lang:
        description: Language tag of pref_label
      lat:
        slot_uri: wgs84_pos:lat
        range: float
      lon:
        slot_uri: wgs84_pos:long
        range: float
      alt:
        slot_uri: wgs84_pos:alt
        range: float

  TimeSpan:
    description: Contextual entity representing a time period.
    class_uri: edm:TimeSpan
    annotations:
      export_type: entity
      export_name_core: timespans_core
      export_name_links: timespans_links
      export_sets: "pipeline,entities"
      id_column: timespan
      link_properties: >-
        alt_label=skos:altLabel,
        same_as=owl:sameAs,
        is_part_of=dcterms:isPartOf,
        has_part=dcterms:hasPart
    attributes:
      timespan:
        range: uri
        required: true
        identifier: true
      pref_label:
        slot_uri: skos:prefLabel
        required: true
      pref_label_lang:
        description: Language tag of pref_label
      begin:
        slot_uri: edm:begin
      end:
        slot_uri: edm:end
      notation:
        slot_uri: skos:notation

  Organization:
    description: Data provider or aggregator organisation.
    class_uri: foaf:Organization
    annotations:
      id_column: org
    attributes:
      org:
        range: uri
        required: true
        identifier: true
      name:
        slot_uri: skos:prefLabel
        required: true
      lang:
        description: Language tag of name
      acronym:
        slot_uri: edm:acronym
      country:
        slot_uri: edm:country
      role:
        slot_uri: edm:europeanaRole
      wikidata:
        slot_uri: owl:sameAs
        range: uri
        description: Filtered to Wikidata entity URIs only.

  # =================================================================
  # Scan exports — flat SPARQL with custom patterns
  # =================================================================

  ItemsCoreRow:
    description: >-
      One row per item with single-valued scalar properties.
      Base table for items_resolved composition.
    annotations:
      export_name: items_core
      export_type: scan
      export_sets: "pipeline,items"
      required_prefixes: "edm,ore,xsd"
      sparql_pattern: |
        {
          SELECT ?item ?agg ?eAgg ?type ?rights ?dataProvider ?provider ?country
          WHERE {
            ?eProxy ore:proxyFor ?item .
            ?eProxy edm:europeanaProxy "true" .
            ?eProxy edm:type ?type .
            ?agg edm:aggregatedCHO ?item .
            ?agg edm:rights ?rights ;
                 edm:dataProvider ?dataProvider ;
                 edm:provider ?provider .
            ?eAgg edm:aggregatedCHO ?item .
            ?eAgg a edm:EuropeanaAggregation .
            ?eAgg edm:country ?country .
            {filters}
          }
        }
      supports_filters: "true"
    attributes:
      item:
        range: uri
        required: true
        annotations:
          sparql_binding: "?item"
      type:
        range: EdmType
        annotations:
          sparql_binding: "?type"
      rights:
        range: uri
        annotations:
          sparql_binding: "?rights"
      country:
        annotations:
          sparql_binding: "?country"
      dataProvider:
        annotations:
          sparql_binding: "?dataProvider"
      provider:
        annotations:
          sparql_binding: "?provider"
      isShownAt:
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?agg edm:isShownAt ?isShownAt }"
      isShownBy:
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?agg edm:isShownBy ?isShownBy }"
      completeness:
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?eAgg edm:completeness ?completeness }"
      preview:
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?eAgg edm:preview ?preview }"
      landingPage:
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?eAgg edm:landingPage ?landingPage }"
      datasetName:
        annotations:
          sparql_binding: "OPTIONAL { ?eAgg edm:datasetName ?datasetName }"

  WebResourceRow:
    description: >-
      Digital representations with technical metadata.
      One row per web resource per item.
    annotations:
      export_name: web_resources
      export_type: scan
      export_sets: "pipeline,items"
      required_prefixes: "edm,ebucore,svcs"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item ;
             edm:isShownBy ?url .
    attributes:
      item:
        range: uri
        required: true
        annotations:
          sparql_binding: "?item"
      url:
        range: uri
        annotations:
          sparql_binding: "?url"
      mime:
        annotations:
          sparql_binding: "OPTIONAL { ?url ebucore:hasMimeType ?mime }"
      width:
        annotations:
          sparql_binding: "OPTIONAL { ?url ebucore:width ?width }"
      height:
        annotations:
          sparql_binding: "OPTIONAL { ?url ebucore:height ?height }"
      bytes:
        annotations:
          sparql_binding: "OPTIONAL { ?url ebucore:fileByteSize ?bytes }"
      wr_rights:
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?url edm:rights ?wr_rights }"
      has_service:
        range: boolean
        annotations:
          sparql_binding: |
            OPTIONAL { ?url svcs:has_service ?_svc }
            BIND(BOUND(?_svc) AS ?has_service)

  InstitutionsRow:
    description: >-
      Organisations with multilingual labels, acronym, country, role,
      and Wikidata links.
    annotations:
      export_name: institutions
      export_type: scan
      export_sets: "pipeline,entities"
      required_prefixes: "edm,foaf,skos,owl"
      sparql_pattern: |
        ?org a foaf:Organization ;
             skos:prefLabel ?name .
        BIND(LANG(?name) AS ?lang)
    attributes:
      org:
        range: uri
        required: true
        annotations:
          sparql_binding: "?org"
      name:
        annotations:
          sparql_binding: "?name"
      lang:
        annotations:
          sparql_binding: "?lang"
      acronym:
        annotations:
          sparql_binding: "OPTIONAL { ?org edm:acronym ?acronym }"
      country:
        annotations:
          sparql_binding: "OPTIONAL { ?org edm:country ?country }"
      role:
        annotations:
          sparql_binding: "OPTIONAL { ?org edm:europeanaRole ?role }"
      wikidata:
        range: uri
        annotations:
          sparql_binding: >-
            OPTIONAL { ?org owl:sameAs ?wikidata .
              FILTER(STRSTARTS(STR(?wikidata), "http://www.wikidata.org/entity/")) }

  # =================================================================
  # Summary exports — SPARQL GROUP BY aggregates
  # =================================================================

  ItemsByType:
    description: Item counts grouped by edm:type.
    annotations:
      export_name: items_by_type
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ore"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:type ?type .
      order_by: "DESC(?count)"
    attributes:
      type:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByCountry:
    description: Item counts grouped by country.
    annotations:
      export_name: items_by_country
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm"
      sparql_pattern: |
        ?eAgg edm:aggregatedCHO ?item .
        ?eAgg a edm:EuropeanaAggregation .
        ?eAgg edm:country ?country .
      order_by: "DESC(?count)"
    attributes:
      country:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByTypeAndCountry:
    description: Item counts grouped by edm:type and country.
    annotations:
      export_name: items_by_type_and_country
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ore"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:type ?type .
        ?eAgg edm:aggregatedCHO ?item .
        ?eAgg a edm:EuropeanaAggregation .
        ?eAgg edm:country ?country .
      order_by: "?type DESC(?count)"
    attributes:
      type:
        annotations: { group_by: "true" }
      country:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByLanguage:
    description: Item counts grouped by edm:language.
    annotations:
      export_name: items_by_language
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm"
      sparql_pattern: |
        ?eAgg edm:aggregatedCHO ?item .
        ?eAgg a edm:EuropeanaAggregation .
        ?eAgg edm:language ?language .
      order_by: "DESC(?count)"
    attributes:
      language:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByTypeAndLanguage:
    description: Item counts grouped by edm:type and edm:language.
    annotations:
      export_name: items_by_type_and_language
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ore"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:type ?type .
        ?eAgg edm:aggregatedCHO ?item .
        ?eAgg a edm:EuropeanaAggregation .
        ?eAgg edm:language ?language .
      order_by: "?type DESC(?count)"
    attributes:
      type:
        annotations: { group_by: "true" }
      language:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByInstitution:
    description: Item counts grouped by institution (edm:dataProvider) with resolved name.
    annotations:
      export_name: items_by_institution
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,skos"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item .
        ?agg edm:dataProvider ?dataProvider .
        OPTIONAL { ?dataProvider skos:prefLabel ?enName . FILTER(LANG(?enName) = "en") }
        OPTIONAL { ?dataProvider skos:prefLabel ?anyName }
      order_by: "DESC(?count)"
    attributes:
      dataProvider:
        annotations: { group_by: "true" }
      institutionName:
        annotations: { aggregation: "SAMPLE(COALESCE(?enName, ?anyName))" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(DISTINCT ?item)" }

  ItemsByAggregator:
    description: Item counts grouped by aggregator (edm:provider) with resolved name.
    annotations:
      export_name: items_by_aggregator
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,skos"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item .
        ?agg edm:provider ?provider .
        OPTIONAL { ?provider skos:prefLabel ?enName . FILTER(LANG(?enName) = "en") }
        OPTIONAL { ?provider skos:prefLabel ?anyName }
      order_by: "DESC(?count)"
    attributes:
      provider:
        annotations: { group_by: "true" }
      aggregatorName:
        annotations: { aggregation: "SAMPLE(COALESCE(?enName, ?anyName))" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(DISTINCT ?item)" }

  ItemsByYear:
    description: Item counts grouped by edm:year.
    annotations:
      export_name: items_by_year
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ore"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:year ?year .
      order_by: "DESC(?count)"
    attributes:
      year:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByRightsUri:
    description: Item counts grouped by rights URI.
    annotations:
      export_name: items_by_rights_uri
      export_type: summary
      export_sets: "pipeline,summary,rights"
      required_prefixes: "edm"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item ;
             edm:rights ?rights .
      order_by: "DESC(?count)"
    attributes:
      rights:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByReuseLevel:
    description: Item counts grouped by reuse level (open, restricted, prohibited).
    annotations:
      export_name: items_by_reuse_level
      export_type: summary
      export_sets: "pipeline,summary,rights"
      required_prefixes: "edm"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item ;
             edm:rights ?rights .
        {reuse_bind}
      order_by: "DESC(?count)"
    attributes:
      reuse_level:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByTypeAndReuseLevel:
    description: Item counts grouped by edm:type and reuse level.
    annotations:
      export_name: items_by_type_and_reuse_level
      export_type: summary
      export_sets: "pipeline,summary,rights"
      required_prefixes: "edm,ore"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:type ?type .
        ?agg edm:aggregatedCHO ?item ;
             edm:rights ?rights .
        {reuse_bind}
      order_by: "?type DESC(?count)"
    attributes:
      type:
        annotations: { group_by: "true" }
      reuse_level:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByCountryAndReuseLevel:
    description: Item counts grouped by country and reuse level.
    annotations:
      export_name: items_by_country_and_reuse_level
      export_type: summary
      export_sets: "pipeline,summary,rights"
      required_prefixes: "edm"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item ;
             edm:rights ?rights .
        ?eAgg edm:aggregatedCHO ?item .
        ?eAgg a edm:EuropeanaAggregation .
        ?eAgg edm:country ?country .
        {reuse_bind}
      order_by: "?country DESC(?count)"
    attributes:
      country:
        annotations: { group_by: "true" }
      reuse_level:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByLanguageAndReuseLevel:
    description: Item counts grouped by dc:language and reuse level.
    annotations:
      export_name: items_by_language_and_reuse_level
      export_type: summary
      export_sets: "pipeline,summary,rights"
      required_prefixes: "dc,edm,ore"
      sparql_pattern: |
        ?proxy ore:proxyFor ?item .
        FILTER NOT EXISTS { ?proxy edm:europeanaProxy "true" . }
        ?proxy dc:language ?language .
        ?agg edm:aggregatedCHO ?item ;
             edm:rights ?rights .
        {reuse_bind}
      order_by: "?language DESC(?count)"
    attributes:
      language:
        annotations: { group_by: "true" }
      reuse_level:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ItemsByCompleteness:
    description: Item counts grouped by completeness score and edm:type.
    annotations:
      export_name: items_by_completeness
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ore"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:type ?type .
        ?eAgg edm:aggregatedCHO ?item .
        ?eAgg a edm:EuropeanaAggregation .
        ?eAgg edm:completeness ?completeness .
      order_by: "?completeness ?type"
    attributes:
      completeness:
        range: integer
        annotations: { group_by: "true" }
      type:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  ContentAvailability:
    description: >-
      Item counts by edm:type, reuse level, and content access method
      (direct URL, IIIF).
    annotations:
      export_name: content_availability
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ore,svcs"
      sparql_pattern: |
        ?eProxy ore:proxyFor ?item .
        ?eProxy edm:europeanaProxy "true" .
        ?eProxy edm:type ?type .
        ?agg edm:aggregatedCHO ?item ;
             edm:rights ?rights .
        {reuse_bind}
        OPTIONAL { ?agg edm:isShownBy ?_isb }
        BIND(BOUND(?_isb) AS ?has_direct_url)
        OPTIONAL {
          ?agg edm:isShownBy ?_wr .
          ?_wr svcs:has_service ?_svc .
        }
        BIND(BOUND(?_svc) AS ?has_iiif)
      order_by: "?type ?reuse_level DESC(?count)"
    attributes:
      type:
        annotations: { group_by: "true" }
      reuse_level:
        annotations: { group_by: "true" }
      has_direct_url:
        range: boolean
        annotations: { group_by: "true" }
      has_iiif:
        range: boolean
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  MimeTypeDistribution:
    description: Item counts grouped by MIME type.
    annotations:
      export_name: mime_type_distribution
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,ebucore"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item .
        ?agg edm:isShownBy ?url .
        ?url ebucore:hasMimeType ?mime .
      order_by: "DESC(?count)"
    attributes:
      mime:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }

  GeolocatedPlaces:
    description: Places with coordinates and English labels.
    annotations:
      export_name: geolocated_places
      export_type: scan
      export_sets: "pipeline,summary"
      required_prefixes: "edm,skos,wgs84_pos"
      sparql_pattern: |
        ?place a edm:Place ;
               wgs84_pos:lat ?lat ;
               wgs84_pos:long ?lon ;
               skos:prefLabel ?name .
        FILTER(LANG(?name) = "en")
    attributes:
      place:
        range: uri
        annotations:
          sparql_binding: "?place"
      name:
        annotations:
          sparql_binding: "?name"
      lat:
        range: float
        annotations:
          sparql_binding: "?lat"
      lon:
        range: float
        annotations:
          sparql_binding: "?lon"

  IiifAvailability:
    description: IIIF-enabled items grouped by institution.
    annotations:
      export_name: iiif_availability
      export_type: summary
      export_sets: "pipeline,summary"
      required_prefixes: "edm,skos,svcs"
      sparql_pattern: |
        ?agg edm:aggregatedCHO ?item ;
             edm:dataProvider ?dataProvider ;
             edm:isShownBy ?url .
        ?url svcs:has_service ?service .
        OPTIONAL { ?dataProvider skos:prefLabel ?enName . FILTER(LANG(?enName) = "en") }
        OPTIONAL { ?dataProvider skos:prefLabel ?anyName }
      order_by: "DESC(?iiif_items)"
    attributes:
      dataProvider:
        annotations: { group_by: "true" }
      institutionName:
        annotations: { aggregation: "SAMPLE(COALESCE(?enName, ?anyName))" }
      iiif_items:
        range: integer
        annotations: { aggregation: "COUNT(DISTINCT ?item)" }

  TextsByType:
    description: dc:type value distribution for TEXT items.
    annotations:
      export_name: texts_by_type
      export_type: summary
      export_sets: "summary"
      required_prefixes: "dc,edm,ore"
      sparql_pattern: |
        ?proxy ore:proxyFor ?item .
        FILTER NOT EXISTS { ?proxy edm:europeanaProxy "true" . }
        ?proxy edm:type "TEXT" .
        ?proxy dc:type ?dcType .
      order_by: "DESC(?count)"
    attributes:
      dcType:
        annotations: { group_by: "true" }
      count:
        range: integer
        annotations: { aggregation: "COUNT(?item)" }


# ===================================================================
# Pipeline metadata (top-level annotations)
# ===================================================================

annotations:
  # Reuse level classification patterns (URI prefix → level).
  reuse_level_open_prefixes: >-
    http://creativecommons.org/publicdomain/,
    http://creativecommons.org/licenses/by/,
    http://creativecommons.org/licenses/by-sa/
  reuse_level_restricted_prefixes: >-
    http://creativecommons.org/licenses/
  reuse_level_restricted_uris: >-
    http://rightsstatements.org/vocab/NoC-NC/1.0/,
    http://rightsstatements.org/vocab/NoC-OKLR/1.0/,
    http://rightsstatements.org/vocab/InC-EDU/1.0/

  # Authority patterns for classifying owl:sameAs links in entity reports.
  authority_patterns: >-
    wikidata=http://www.wikidata.org/,
    viaf=http://viaf.org/,
    gnd=http://d-nb.info/gnd/,
    ulan=http://vocab.getty.edu/ulan/,
    isni=http://isni.org/,
    loc=http://id.loc.gov/,
    bnf=http://data.bnf.fr/,
    geonames=http://sws.geonames.org/
