        range: string

  # =================================================================
  # map_sameAs — owl:sameAs links from all entity classes
  # =================================================================

  MapSameAs:
    description: >-
      Identity links from Agent / Place / Concept / TimeSpan entities,
      classified by target-URI authority.
    annotations:
      table_name: map_sameAs
      export_type: map
      export_sets: "pipeline,maps"
      depends_on: >-
        links_edm_Agent, links_edm_Place, links_skos_Concept, links_edm_TimeSpan
    attributes:
      k_iri:
        range: uri
        required: true
      v_owl_sameAs:
        range: uri
      x_well_formed:
        range: boolean
        description: >-
          True when v_owl_sameAs passes basic LOD-URI hygiene checks:
          HTTP(S) scheme, well-formed authority, no whitespace or
          template artefacts. Not RFC 3987 grammar conformance — just
          enough to rule out obviously broken values. Required for
          x_authority to be set.
      x_metis_known:
        range: boolean
        description: >-
          True when v_owl_sameAs matches the prefix of a vocabulary in
          the Metis registry (references/vocabularies/metis-vocabularies/).
          Honest framing: we recognise the vocabulary, we have not
          probed the URL for resolvability. Required for x_authority to
          be set.
      x_authority:
        range: Authority
        description: >-
          Metis vocabulary short name when x_well_formed AND
          x_metis_known; NULL otherwise. Use WHERE x_well_formed AND
          x_metis_known in queries that need only Metis-recognised
          authority links.
      x_entity_class:
        range: EntityClass

  # =================================================================
  # map_cho_entities — CHO ↔ contextual entity references
  # =================================================================

  MapChoEntities:
    description: >-
      Maps CHOs to the contextual entities they reference via provider-
      proxy properties whose value is an IRI matching a known entity.
    annotations:
      table_name: map_cho_entities
      export_type: map
      export_sets: "pipeline,maps"
      depends_on: >-
        links_ore_Proxy, values_ore_Proxy,
        values_edm_Agent, values_edm_Place,
        values_skos_Concept, values_edm_TimeSpan
    attributes:
      k_iri_cho:
        range: uri
        required: true
      k_iri_entity:
        range: uri
        required: true
      x_entity_class:
        range: EntityClass
      x_property:
        range: string
        description: The proxy property column name (v_dc_subject, etc.).

  # =================================================================
  # map_edm_entities — Europeana enrichment edges
  # =================================================================

  MapEdmEntities:
    description: >-
      The Europeana enrichment edge table: one row per (CHO, entity)
      pair where the entity is part of Europeana's curated EDM
      collection (the four data.europeana.eu/{agent,place,concept,
      timespan}/ namespaces). Provider-local entity URIs that haven't
      been reconciled to Europeana's collection are deliberately
      excluded — they aren't enrichment, just unresolved identifiers.
      Deduplicated on (k_iri_cho, k_iri_entity, x_entity_class) so a
      CHO referencing the same entity through multiple proxy
      properties counts once. The catalogue side (entity + label +
      item count) is derivable on the fly via GROUP BY against this
      table joined with values_<class> for labels.
    annotations:
      table_name: map_edm_entities
      export_type: map
      export_sets: "pipeline,maps"
      depends_on: "map_cho_entities"
    attributes:
      k_iri_cho:
        range: uri
        required: true
      k_iri_entity:
        range: uri
        required: true
      x_entity_class:
        range: EntityClass

# ===================================================================
# Pipeline metadata (top-level annotations)
# ===================================================================

annotations:
  # Reuse level classification patterns (URI prefix → level).
  reuse_level_open_prefixes: >-
    http://creativecommons.org/publicdomain/,
    http://creativecommons.org/licenses/by/,
    http://creativecommons.org/licenses/by-sa/
  reuse_level_restricted_prefixes: >-
    http://creativecommons.org/licenses/
  reuse_level_restricted_uris: >-
    http://rightsstatements.org/vocab/NoC-NC/1.0/,
    http://rightsstatements.org/vocab/NoC-OKLR/1.0/,
    http://rightsstatements.org/vocab/InC-EDU/1.0/

  # Authority recognition is sourced from references/vocabularies/metis-vocabularies/
  # — Europeana's own registry of vocabularies its Metis pipeline knows about.
  # Each vocabulary's metadata YAML declares the URI prefixes Metis treats as
  # canonical. The schema_loader.metis_vocabularies() function loads them at
  # runtime; no patterns are embedded here. To add or update authorities,
  # re-run scripts/update-metis-vocabularies.py.
