      depends_on: >-
        values_edm_ProvidedCHO, values_ore_Proxy, values_ore_Aggregation,
        values_edm_EuropeanaAggregation, values_edm_WebResource,
        values_svcs_Service, values_publishing_tier, links_ore_Proxy
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
      v_edm_country:
        range: string
      v_edm_dataProvider:
        range: string
      v_edm_datasetName:
        range: string
      v_edm_provider:
        range: string
