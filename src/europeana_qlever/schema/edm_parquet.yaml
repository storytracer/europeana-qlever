id: https://europeana.eu/schemas/edm-parquet
name: edm_parquet
title: Europeana EDM → Parquet Export Schema
description: >-
  Fully declarative export schema for the europeana-qlever pipeline.

  Each export table is a LinkML class with annotations that drive SPARQL
  generation, DuckDB composition, and PyArrow types.  Adding a new export
  requires only editing this file — no Python code changes.

  Column and table naming conventions:

  - Tables start with one of four prefixes:
    * values_   raw scalar EDM properties (wide, one row per entity)
    * links_    raw multi-valued EDM properties (long, one row per value)
    * group_    pre-computed dimensions for fast analytics (wide, all scalar)
    * map_      static lookup and navigation tables

  - Columns start with one of three prefixes:
    * k_  identifier / foreign key
    * v_  scalar EDM property, directly from the RDF, one per row
    * x_  extracted / computed / resolved / aggregated

  Column names derive mechanically from EDM CURIEs: ``dc:subject`` →
  ``v_dc_subject``, ``ebucore:fileByteSize`` → ``v_ebucore_fileByteSize``,
  ``skos:prefLabel`` → ``v_skos_prefLabel``.

version: "0.3.0"

prefixes:
  linkml: https://w3id.org/linkml/
  cc: http://creativecommons.org/ns#
  dc: http://purl.org/dc/elements/1.1/
  dcterms: http://purl.org/dc/terms/
  doap: http://usefulinc.com/ns/doap#
  dqv: http://www.w3.org/ns/dqv#
  ebucore: http://www.ebu.ch/metadata/ontologies/ebucore/ebucore#
  edm: http://www.europeana.eu/schemas/edm/
  foaf: http://xmlns.com/foaf/0.1/
  oa: http://www.w3.org/ns/oa#
  odrl: http://www.w3.org/ns/odrl/2/
  ore: http://www.openarchives.org/ore/terms/
  owl: http://www.w3.org/2002/07/owl#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  rdaGr2: http://rdvocab.info/ElementsGr2/
  schema: http://schema.org/
  skos: http://www.w3.org/2004/02/skos/core#
  svcs: http://rdfs.org/sioc/services#
  view: https://qlever.cs.uni-freiburg.de/materializedView/
  wgs84_pos: http://www.w3.org/2003/01/geo/wgs84_pos#
  xsd: http://www.w3.org/2001/XMLSchema#

default_range: string

imports:
  - linkml:types
  - ./edm

# ===================================================================
# Enums
# ===================================================================

enums:
  ReuseLevel:
    permissible_values:
      open: { description: "CC0, CC-BY, CC-BY-SA, CC public domain" }
      restricted: { description: "CC-NC/ND variants, select RightsStatements.org" }
      prohibited: { description: "InC, CNE, NKC, UND, and other non-reuse" }

  EntityClass:
    permissible_values:
      edm_Agent: {}
      edm_Place: {}
      skos_Concept: {}
      edm_TimeSpan: {}

  RightsFamily:
    permissible_values:
      cc0: {}
      pdm: {}
      cc-by: {}
      cc-by-sa: {}
      cc-by-nd: {}
      cc-by-nc: {}
      cc-by-nc-sa: {}
      cc-by-nc-nd: {}
      rs-inc: {}
      rs-noc: {}
      rs-other: {}
      cnb: {}
      orphan: {}
      unknown: {}

  Authority:
    description: >-
      Short name of a Metis vocabulary (filename stem under
      references/vocabularies/metis-vocabularies/vocabularies/, e.g.
      ``wikidata``, ``aat``, ``gnd``). Range is open by design — the set
      of known authorities is sourced from the Metis registry and
      changes whenever it's resynced. Not enumerated here to avoid
      drift.

classes:

  # =================================================================
  # values_edm_ProvidedCHO — minimal CHO anchor
  # =================================================================

  ProvidedChoValues:
    description: >-
      One row per cultural heritage object. Minimal — CHO carries no
      descriptive metadata directly; see links_ore_Proxy for properties
      on the provider/Europeana proxies.
    class_uri: edm:ProvidedCHO
    annotations:
      table_name: values_edm_ProvidedCHO
      export_type: values
      export_sets: "pipeline,raw"
      sparql_base_pattern: "?k_iri a edm:ProvidedCHO ."
      required_prefixes: "edm"
      sample_subject_variable: "k_iri"
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
        description: CHO URI (e.g. http://data.europeana.eu/item/123/abc).
        annotations:
          sparql_binding: "?k_iri"

  # =================================================================
  # values_ore_Proxy — one row per proxy (2 per CHO)
  # =================================================================

  ProxyValues:
    description: >-
      One row per proxy. Each CHO has a provider proxy (original
      metadata) and a Europeana proxy (normalised enrichments).
      Distinguish via v_edm_europeanaProxy.
    class_uri: ore:Proxy
    annotations:
      table_name: values_ore_Proxy
      export_type: values
      export_sets: "pipeline,raw"
      sparql_base_pattern: "?k_iri ore:proxyFor ?k_iri_cho ."
      required_prefixes: "edm,ore"
      sample_subject_variable: "k_iri_cho"
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
        description: Proxy URI.
        annotations:
          sparql_binding: "?k_iri"
      k_iri_cho:
        range: uri
        required: true
        description: Foreign key to the CHO (from ore:proxyFor).
        annotations:
          sparql_binding: "?k_iri_cho"
      v_edm_currentLocation:
        slot_uri: edm:currentLocation
        range: string
        description: edm:currentLocation value (provider proxy).
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:currentLocation ?v_edm_currentLocation }"
      v_edm_europeanaProxy:
        slot_uri: edm:europeanaProxy
        range: string
        description: >-
          "true" on the Europeana proxy, absent/empty on the provider proxy.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:europeanaProxy ?v_edm_europeanaProxy }"
      v_edm_isRepresentationOf:
        slot_uri: edm:isRepresentationOf
        range: uri
        description: edm:isRepresentationOf target.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:isRepresentationOf ?v_edm_isRepresentationOf }"
      v_edm_type:
        slot_uri: edm:type
        range: string
        description: edm:type enum (IMAGE, TEXT, SOUND, VIDEO, 3D). On Europeana proxy only.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:type ?v_edm_type }"
      v_ore_proxyFor:
        slot_uri: ore:proxyFor
        range: uri
        description: The CHO this proxy describes (same as k_iri_cho).
        annotations:
          sparql_binding: "?k_iri_cho AS ?v_ore_proxyFor"
      v_ore_proxyIn:
        slot_uri: ore:proxyIn
        range: uri
        description: Aggregation this proxy participates in.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ore:proxyIn ?v_ore_proxyIn }"

  # =================================================================
  # links_ore_Proxy — all multi-valued ProvidedCHO + Proxy properties
  # =================================================================

  ProxyLinks:
    description: >-
      All multi-valued properties from ProvidedCHO and Proxy in long format.
      One row per value. k_iri is the proxy URI — join with values_ore_Proxy
      on k_iri to get the CHO key.
    class_uri: ore:Proxy
    annotations:
      table_name: links_ore_Proxy
      export_type: links
      export_sets: "pipeline,raw"
      subject_base_pattern: "?k_iri ore:proxyFor ?_cho ."
      required_prefixes: "dc,dcterms,edm,ore,owl,skos"
      sample_subject_variable: "_cho"
      # Comma-separated list of multi-valued EDM properties.
      # Each produces one intermediate SPARQL scan.
      link_properties: >-
        dc:contributor, dc:coverage, dc:creator, dc:date, dc:description,
        dc:format, dc:identifier, dc:language, dc:publisher, dc:relation,
        dc:rights, dc:source, dc:subject, dc:title, dc:type,
        dcterms:alternative, dcterms:conformsTo, dcterms:created,
        dcterms:extent, dcterms:hasFormat, dcterms:hasPart, dcterms:hasVersion,
        dcterms:isFormatOf, dcterms:isPartOf, dcterms:isReferencedBy,
        dcterms:isReplacedBy, dcterms:isRequiredBy, dcterms:issued,
        dcterms:isVersionOf, dcterms:medium, dcterms:provenance,
        dcterms:references, dcterms:replaces, dcterms:requires,
        dcterms:spatial, dcterms:tableOfContents, dcterms:temporal,
        edm:hasMet, edm:hasType, edm:incorporates, edm:isDerivativeOf,
        edm:isNextInSequence, edm:isRelatedTo, edm:isSimilarTo,
        edm:isSuccessorOf, edm:realizes, edm:userTag, edm:year,
        ore:lineage, owl:sameAs
    attributes:
      k_iri:
        range: uri
        description: Proxy URI.
      x_property:
        range: string
        description: Property column name (e.g. v_dc_subject, v_edm_hasMet).
      x_value:
        range: string
        description: Property value as a string.
      x_value_is_iri:
        range: boolean
        description: Whether x_value is an IRI rather than a literal.
      x_value_lang:
        range: string
        description: Language tag of x_value (null if absent).

  # =================================================================
  # values_ore_Aggregation — one row per provider aggregation
  # =================================================================

  AggregationValues:
    description: >-
      Provider aggregation — rights, data supply chain, digital object URLs.
      One row per aggregation.
    class_uri: ore:Aggregation
    annotations:
      table_name: values_ore_Aggregation
      export_type: values
      export_sets: "pipeline,raw"
      sparql_base_pattern: "?k_iri edm:aggregatedCHO ?k_iri_cho ."
      # Exclude the EuropeanaAggregation by filtering on typed aggregation
      # (provider aggregations have dataProvider, EuropeanaAggregation does not).
      sparql_extra: "?k_iri edm:dataProvider ?v_edm_dataProvider ."
      required_prefixes: "dcterms,edm,ore"
      sample_subject_variable: "k_iri_cho"
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
        description: Aggregation URI.
        annotations:
          sparql_binding: "?k_iri"
      k_iri_cho:
        range: uri
        required: true
        description: Foreign key to the CHO (from edm:aggregatedCHO).
        annotations:
          sparql_binding: "?k_iri_cho"
      v_dcterms_created:
        slot_uri: dcterms:created
        range: string
        description: Provider's creation timestamp for this aggregation.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri dcterms:created ?v_dcterms_created }"
      v_dcterms_modified:
        slot_uri: dcterms:modified
        range: string
        description: Provider's modification timestamp.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri dcterms:modified ?v_dcterms_modified }"
      v_edm_dataProvider:
        slot_uri: edm:dataProvider
        range: string
        description: Data provider organisation URI or literal.
        annotations:
          sparql_binding: "?v_edm_dataProvider"
      v_edm_isShownAt:
        slot_uri: edm:isShownAt
        range: uri
        description: Landing page URL at provider website.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:isShownAt ?v_edm_isShownAt }"
      v_edm_isShownBy:
        slot_uri: edm:isShownBy
        range: uri
        description: Direct content URL (primary digital object).
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:isShownBy ?v_edm_isShownBy }"
      v_edm_object:
        slot_uri: edm:object
        range: uri
        description: Thumbnail/object URL provided by the aggregator.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:object ?v_edm_object }"
      v_edm_provider:
        slot_uri: edm:provider
        range: string
        description: Aggregator organisation URI or literal.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:provider ?v_edm_provider }"
      v_edm_rights:
        slot_uri: edm:rights
        range: uri
        description: edm:rights URI (license/rights statement).
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:rights ?v_edm_rights }"
      v_edm_ugc:
        slot_uri: edm:ugc
        range: string
        description: Whether content is user-generated ("true"/"false").
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:ugc ?v_edm_ugc }"

  # =================================================================
  # links_ore_Aggregation — multi-valued aggregation properties
  # =================================================================

  AggregationLinks:
    description: Multi-valued properties on the provider aggregation.
    class_uri: ore:Aggregation
    annotations:
      table_name: links_ore_Aggregation
      export_type: links
      export_sets: "pipeline,raw"
      subject_base_pattern: "?k_iri edm:aggregatedCHO ?_cho . ?k_iri edm:dataProvider ?_dp ."
      required_prefixes: "dc,dqv,edm,ore"
      sample_subject_variable: "_cho"
      link_properties: >-
        dc:rights, dqv:hasQualityAnnotation, edm:hasView,
        edm:intermediateProvider
    attributes:
      k_iri: { range: uri }
      x_property: { range: string }
      x_value: { range: string }
      x_value_is_iri: { range: boolean }
      x_value_lang: { range: string }

  # =================================================================
  # values_edm_EuropeanaAggregation — one row per CHO
  # =================================================================

  EuropeanaAggregationValues:
    description: >-
      Europeana-side aggregation — country, dataset name, completeness,
      language. One row per CHO.
    class_uri: edm:EuropeanaAggregation
    annotations:
      table_name: values_edm_EuropeanaAggregation
      export_type: values
      export_sets: "pipeline,raw"
      sparql_base_pattern: "?k_iri a edm:EuropeanaAggregation ."
      sparql_extra: "?k_iri edm:aggregatedCHO ?k_iri_cho ."
      required_prefixes: "edm"
      sample_subject_variable: "k_iri_cho"
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
        annotations:
          sparql_binding: "?k_iri"
      k_iri_cho:
        range: uri
        required: true
        annotations:
          sparql_binding: "?k_iri_cho"
      v_edm_completeness:
        slot_uri: edm:completeness
        range: integer
        description: Metadata completeness score (0–15).
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:completeness ?v_edm_completeness }"
      v_edm_country:
        slot_uri: edm:country
        range: string
        description: Country of the providing institution.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:country ?v_edm_country }"
      v_edm_datasetName:
        slot_uri: edm:datasetName
        range: string
        description: Dataset/collection name.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:datasetName ?v_edm_datasetName }"
      v_edm_landingPage:
        slot_uri: edm:landingPage
        range: uri
        description: Europeana portal URL for this item.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:landingPage ?v_edm_landingPage }"
      v_edm_language:
        slot_uri: edm:language
        range: string
        description: Normalised language code.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:language ?v_edm_language }"
      v_edm_preview:
        slot_uri: edm:preview
        range: uri
        description: Thumbnail URL.
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:preview ?v_edm_preview }"

  # =================================================================
  # values_edm_WebResource — one row per web resource
  # =================================================================

  WebResourceValues:
    description: >-
      Digital representations (images, audio, video, text). One row per
      web resource. k_iri_cho links back to the CHO via the aggregation.
    class_uri: edm:WebResource
    annotations:
      table_name: values_edm_WebResource
      export_type: values
      export_sets: "pipeline,raw"
      # Match web resources via either edm:isShownBy or edm:hasView.
      # Using UNION in the outer query is brittle in QLever — use a
      # property path disjunction instead.
      sparql_base_pattern: "?_agg edm:aggregatedCHO ?k_iri_cho . { ?_agg edm:isShownBy ?k_iri } UNION { ?_agg edm:hasView ?k_iri }"
      required_prefixes: "ebucore,edm,rdf,schema"
      sample_subject_variable: "k_iri_cho"
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
        annotations:
          sparql_binding: "?k_iri"
      k_iri_cho:
        range: uri
        required: true
        annotations:
          sparql_binding: "?k_iri_cho"
      v_ebucore_audioChannelNumber:
        slot_uri: ebucore:audioChannelNumber
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:audioChannelNumber ?v_ebucore_audioChannelNumber }"
      v_ebucore_bitRate:
        slot_uri: ebucore:bitRate
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:bitRate ?v_ebucore_bitRate }"
      v_ebucore_duration:
        slot_uri: ebucore:duration
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:duration ?v_ebucore_duration }"
      v_ebucore_fileByteSize:
        slot_uri: ebucore:fileByteSize
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:fileByteSize ?v_ebucore_fileByteSize }"
      v_ebucore_frameRate:
        slot_uri: ebucore:frameRate
        range: float
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:frameRate ?v_ebucore_frameRate }"
      v_ebucore_hasMimeType:
        slot_uri: ebucore:hasMimeType
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:hasMimeType ?v_ebucore_hasMimeType }"
      v_ebucore_height:
        slot_uri: ebucore:height
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:height ?v_ebucore_height }"
      v_ebucore_orientation:
        slot_uri: ebucore:orientation
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:orientation ?v_ebucore_orientation }"
      v_ebucore_sampleRate:
        slot_uri: ebucore:sampleRate
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:sampleRate ?v_ebucore_sampleRate }"
      v_ebucore_sampleSize:
        slot_uri: ebucore:sampleSize
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:sampleSize ?v_ebucore_sampleSize }"
      v_ebucore_width:
        slot_uri: ebucore:width
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri ebucore:width ?v_ebucore_width }"
      v_edm_codecName:
        slot_uri: edm:codecName
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:codecName ?v_edm_codecName }"
      v_edm_hasColorSpace:
        slot_uri: edm:hasColorSpace
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:hasColorSpace ?v_edm_hasColorSpace }"
      v_edm_isNextInSequence:
        slot_uri: edm:isNextInSequence
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:isNextInSequence ?v_edm_isNextInSequence }"
      v_edm_pointCount:
        slot_uri: edm:pointCount
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:pointCount ?v_edm_pointCount }"
      v_edm_polygonCount:
        slot_uri: edm:polygonCount
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:polygonCount ?v_edm_polygonCount }"
      v_edm_preview:
        slot_uri: edm:preview
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:preview ?v_edm_preview }"
      v_edm_rights:
        slot_uri: edm:rights
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:rights ?v_edm_rights }"
      v_edm_spatialResolution:
        slot_uri: edm:spatialResolution
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:spatialResolution ?v_edm_spatialResolution }"
      v_edm_type:
        slot_uri: edm:type
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:type ?v_edm_type }"
      v_edm_vertexCount:
        slot_uri: edm:vertexCount
        range: integer
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:vertexCount ?v_edm_vertexCount }"
      v_rdf_type:
        slot_uri: rdf:type
        range: uri
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri rdf:type ?v_rdf_type }"
      v_schema_digitalSourceType:
        slot_uri: schema:digitalSourceType
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri schema:digitalSourceType ?v_schema_digitalSourceType }"

  # =================================================================
  # links_edm_WebResource
  # =================================================================

  WebResourceLinks:
    description: Multi-valued properties on web resources.
    class_uri: edm:WebResource
    annotations:
      table_name: links_edm_WebResource
      export_type: links
      export_sets: "pipeline,raw"
      subject_base_pattern: "?_agg edm:aggregatedCHO ?_cho . { ?_agg edm:isShownBy ?k_iri } UNION { ?_agg edm:hasView ?k_iri }"
      required_prefixes: "dc,dcterms,edm,owl,rdfs,svcs"
      sample_subject_variable: "_cho"
      link_properties: >-
        dc:creator, dc:description, dc:format, dc:language, dc:rights,
        dc:source, dc:title, dc:type, dcterms:conformsTo, dcterms:created,
        dcterms:extent, dcterms:hasPart, dcterms:isFormatOf, dcterms:isPartOf,
        dcterms:isReferencedBy, dcterms:issued, dcterms:temporal,
        edm:componentColor, edm:intendedUsage, edm:isRepresentationOf,
        owl:sameAs, rdfs:seeAlso, svcs:has_service
    attributes:
      k_iri: { range: uri }
      x_property: { range: string }
      x_value: { range: string }
      x_value_is_iri: { range: boolean }
      x_value_lang: { range: string }

  # =================================================================
  # values_edm_Agent — one row per prefLabel variant
  # =================================================================

  AgentValues:
    description: >-
      Contextual agent entities (persons and organisations). One row per
      skos:prefLabel variant.
    class_uri: edm:Agent
    annotations:
      table_name: values_edm_Agent
      export_type: values
      export_sets: "pipeline,raw"
      sparql_base_pattern: "?k_iri a edm:Agent . ?k_iri skos:prefLabel ?v_skos_prefLabel ."
      sparql_extra: "BIND(LANG(?v_skos_prefLabel) AS ?x_prefLabel_lang)"
      required_prefixes: "edm,rdaGr2,skos"
    attributes:
      k_iri:
        range: uri
        required: true
        identifier: true
        annotations:
          sparql_binding: "?k_iri"
      v_edm_begin:
        slot_uri: edm:begin
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:begin ?v_edm_begin }"
      v_edm_end:
        slot_uri: edm:end
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri edm:end ?v_edm_end }"
      v_rdaGr2_dateOfBirth:
        slot_uri: rdaGr2:dateOfBirth
        range: string
        annotations:
          sparql_binding: "OPTIONAL { ?k_iri rdaGr2:dateOfBirth ?v_rdaGr2_dateOfBirth }"
      v_rdaGr2_dateOfDeath:
