        range: boolean
      x_has_iiif:
        range: boolean
      x_has_subject:
        range: boolean
      x_primary_language:
        range: string
      x_reuse_level:
        range: ReuseLevel
      x_rights_family:
        range: RightsFamily
      x_content_tier:
        range: integer
        description: >-
          Europeana Content Tier (0–4) for this item, derived from the
          provider aggregation's epf:contentTierN quality annotation. NULL
          when the annotation is missing.
      x_metadata_tier:
        range: string
        description: >-
          Europeana Metadata Tier (0, A, B, C) for this item, derived from
          the provider aggregation's epf:metadataTierX quality annotation.
          NULL when the annotation is missing.

