name: Entity Enrichment
description: Entity counts, label coverage, authority linking, and the most-referenced subject concepts.

questions:
  - id: entity_counts
    question: "Total entities and average prefLabel variants per entity type"
    backend: parquet
    query: |
      SELECT 'edm_Agent' AS entity_type,
             count(DISTINCT k_iri) AS total_entities,
             round(avg(cnt), 2) AS avg_pref_label_variants
      FROM (SELECT k_iri, count(*) AS cnt FROM values_edm_Agent GROUP BY k_iri)
      UNION ALL
      SELECT 'edm_Place',
             count(DISTINCT k_iri),
             round(avg(cnt), 2)
      FROM (SELECT k_iri, count(*) AS cnt FROM values_edm_Place GROUP BY k_iri)
      UNION ALL
      SELECT 'skos_Concept',
             count(DISTINCT k_iri),
             round(avg(cnt), 2)
      FROM (SELECT k_iri, count(*) AS cnt FROM values_skos_Concept GROUP BY k_iri)
      UNION ALL
      SELECT 'edm_TimeSpan',
             count(DISTINCT k_iri),
             round(avg(cnt), 2)
      FROM (SELECT k_iri, count(*) AS cnt FROM values_edm_TimeSpan GROUP BY k_iri)

  - id: same_as_coverage
    question: "owl:sameAs coverage per entity type"
    backend: parquet
    query: |
      WITH totals AS (
          SELECT 'edm_Agent' AS entity_type, count(DISTINCT k_iri) AS total FROM values_edm_Agent
          UNION ALL
          SELECT 'edm_Place', count(DISTINCT k_iri) FROM values_edm_Place
          UNION ALL
          SELECT 'skos_Concept', count(DISTINCT k_iri) FROM values_skos_Concept
          UNION ALL
          SELECT 'edm_TimeSpan', count(DISTINCT k_iri) FROM values_edm_TimeSpan
      ),
      linked AS (
          SELECT x_entity_class AS entity_type, count(DISTINCT k_iri) AS with_same_as
          FROM map_sameAs
          GROUP BY x_entity_class
      )
      SELECT t.entity_type,
             t.total,
             COALESCE(l.with_same_as, 0) AS with_same_as,
             round(COALESCE(l.with_same_as, 0) * 100.0 / t.total, 2) AS coverage_pct
      FROM totals t
      LEFT JOIN linked l ON t.entity_type = l.entity_type
      ORDER BY t.entity_type

  - id: alt_label_coverage
    question: "altLabel coverage per entity type"
    backend: parquet
    query: |
      WITH totals AS (
          SELECT 'edm_Agent' AS entity_type, count(DISTINCT k_iri) AS total FROM values_edm_Agent
          UNION ALL
          SELECT 'edm_Place', count(DISTINCT k_iri) FROM values_edm_Place
          UNION ALL
          SELECT 'skos_Concept', count(DISTINCT k_iri) FROM values_skos_Concept
          UNION ALL
          SELECT 'edm_TimeSpan', count(DISTINCT k_iri) FROM values_edm_TimeSpan
      ),
      with_alt AS (
          SELECT 'edm_Agent' AS entity_type, count(DISTINCT k_iri) AS with_alt_label
          FROM links_edm_Agent WHERE x_property = 'v_skos_altLabel'
          UNION ALL
          SELECT 'edm_Place', count(DISTINCT k_iri)
          FROM links_edm_Place WHERE x_property = 'v_skos_altLabel'
          UNION ALL
          SELECT 'skos_Concept', count(DISTINCT k_iri)
          FROM links_skos_Concept WHERE x_property = 'v_skos_altLabel'
          UNION ALL
          SELECT 'edm_TimeSpan', count(DISTINCT k_iri)
          FROM links_edm_TimeSpan WHERE x_property = 'v_skos_altLabel'
      )
      SELECT t.entity_type,
             t.total,
             COALESCE(a.with_alt_label, 0) AS with_alt_label,
             round(COALESCE(a.with_alt_label, 0) * 100.0 / t.total, 2) AS coverage_pct
      FROM totals t
      LEFT JOIN with_alt a ON t.entity_type = a.entity_type
      ORDER BY t.entity_type

  - id: concept_hierarchy
    question: "Concept hierarchy coverage (exactMatch, broader, narrower)"
    backend: parquet
    query: |
      SELECT x_property AS property,
             count(DISTINCT k_iri) AS concepts_with_property,
             round(count(DISTINCT k_iri) * 100.0 / (
                 SELECT count(DISTINCT k_iri) FROM values_skos_Concept
             ), 2) AS coverage_pct
      FROM links_skos_Concept
      WHERE x_property IN ('v_skos_exactMatch', 'v_skos_broader', 'v_skos_narrower')
      GROUP BY x_property
      ORDER BY concepts_with_property DESC

  - id: top_subjects
    question: "Top 20 subject concepts used across items"
    backend: parquet
    query: |
      SELECT c.v_skos_prefLabel AS subject,
             m.k_iri_entity AS concept_uri,
             n AS count
      FROM (
          SELECT k_iri_entity, count(DISTINCT k_iri_cho) AS n
          FROM map_cho_entities
          WHERE x_entity_class = 'skos_Concept'
            AND x_property = 'v_dc_subject'
          GROUP BY k_iri_entity
      ) m
      LEFT JOIN (
          SELECT k_iri,
                 COALESCE(MAX(v_skos_prefLabel) FILTER (WHERE x_prefLabel_lang = 'en'),
                          MAX(v_skos_prefLabel)) AS v_skos_prefLabel
          FROM values_skos_Concept
          GROUP BY k_iri
      ) c ON m.k_iri_entity = c.k_iri
      ORDER BY n DESC
      LIMIT 20
