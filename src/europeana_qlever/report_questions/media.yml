name: Media and Content Quality
description: Image resolution, file size, MIME families, IIIF coverage, 3D spatial resolution — all over values_edm_WebResource.

questions:
  - id: image_resolution_buckets
    question: "Image resolution distribution by megapixel buckets (web resources with image MIME type)"
    backend: parquet
    query: |
      WITH buckets AS (
          SELECT CASE
                     WHEN v_ebucore_width IS NULL OR v_ebucore_height IS NULL THEN 'unknown'
                     WHEN v_ebucore_width * v_ebucore_height < 100000 THEN '< 0.1 MP'
                     WHEN v_ebucore_width * v_ebucore_height < 500000 THEN '0.1-0.5 MP'
                     WHEN v_ebucore_width * v_ebucore_height < 1000000 THEN '0.5-1 MP'
                     WHEN v_ebucore_width * v_ebucore_height < 4000000 THEN '1-4 MP'
                     WHEN v_ebucore_width * v_ebucore_height < 16000000 THEN '4-16 MP'
                     ELSE '>= 16 MP'
                 END AS resolution_bucket
          FROM values_edm_WebResource
          WHERE v_ebucore_hasMimeType LIKE 'image/%'
      )
      SELECT resolution_bucket,
             count(*) AS resources,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM buckets
      GROUP BY resolution_bucket
      ORDER BY CASE resolution_bucket
                   WHEN 'unknown' THEN 0
                   WHEN '< 0.1 MP' THEN 1
                   WHEN '0.1-0.5 MP' THEN 2
                   WHEN '0.5-1 MP' THEN 3
                   WHEN '1-4 MP' THEN 4
                   WHEN '4-16 MP' THEN 5
                   WHEN '>= 16 MP' THEN 6
               END

  - id: file_size_buckets
    question: "File-size distribution by bucket (web resources with a recorded byte size)"
    backend: parquet
    query: |
      WITH buckets AS (
          SELECT CASE
                     WHEN v_ebucore_fileByteSize < 100 * 1024 THEN '< 100 KB'
                     WHEN v_ebucore_fileByteSize < 1024 * 1024 THEN '100 KB - 1 MB'
                     WHEN v_ebucore_fileByteSize < 10 * 1024 * 1024 THEN '1 MB - 10 MB'
                     WHEN v_ebucore_fileByteSize < 100 * 1024 * 1024 THEN '10 MB - 100 MB'
                     WHEN v_ebucore_fileByteSize < 1024 * 1024 * 1024 THEN '100 MB - 1 GB'
                     ELSE '>= 1 GB'
                 END AS size_bucket
          FROM values_edm_WebResource
          WHERE v_ebucore_fileByteSize IS NOT NULL
      )
      SELECT size_bucket,
             count(*) AS resources,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM buckets
      GROUP BY size_bucket
      ORDER BY CASE size_bucket
                   WHEN '< 100 KB' THEN 1
                   WHEN '100 KB - 1 MB' THEN 2
                   WHEN '1 MB - 10 MB' THEN 3
                   WHEN '10 MB - 100 MB' THEN 4
                   WHEN '100 MB - 1 GB' THEN 5
                   WHEN '>= 1 GB' THEN 6
               END

  - id: mime_family_breakdown
    question: "MIME family breakdown (image/*, text/*, video/*, audio/*, model/*, application/*)"
    backend: parquet
    query: |
      WITH families AS (
          SELECT CASE
                     WHEN v_ebucore_hasMimeType IS NULL THEN 'unknown'
                     WHEN position('/' IN v_ebucore_hasMimeType) = 0 THEN 'malformed'
                     ELSE split_part(v_ebucore_hasMimeType, '/', 1)
                 END AS mime_family
          FROM values_edm_WebResource
      )
      SELECT mime_family,
             count(*) AS resources,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM families
      GROUP BY mime_family
      ORDER BY resources DESC

  - id: iiif_by_mime_family
    question: "IIIF adoption by MIME family (web resources with both MIME and IIIF service info)"
    backend: parquet
    query: |
      WITH iiif_wrs AS (
          SELECT DISTINCT k_iri_webresource
          FROM values_svcs_Service
      ),
      families AS (
          SELECT split_part(wr.v_ebucore_hasMimeType, '/', 1) AS mime_family,
                 (s.k_iri_webresource IS NOT NULL) AS x_has_iiif
          FROM values_edm_WebResource wr
          LEFT JOIN iiif_wrs s ON s.k_iri_webresource = wr.k_iri
          WHERE wr.v_ebucore_hasMimeType IS NOT NULL
            AND position('/' IN wr.v_ebucore_hasMimeType) > 0
      )
      SELECT mime_family,
             count(*) AS resources,
             count(*) FILTER (WHERE x_has_iiif) AS iiif_resources,
             round(count(*) FILTER (WHERE x_has_iiif) * 100.0 / count(*), 2) AS pct_iiif
      FROM families
      GROUP BY mime_family
      ORDER BY resources DESC

  - id: spatial_resolution_3d
    question: "3D spatial-resolution coverage and stats (web resources with v_edm_spatialResolution set)"
    backend: parquet
    query: |
      SELECT count(*) AS resources_with_resolution,
             round(avg(v_edm_spatialResolution), 2) AS avg_resolution,
             quantile_cont(v_edm_spatialResolution, 0.5) AS median_resolution,
             quantile_cont(v_edm_spatialResolution, 0.9) AS p90_resolution
      FROM values_edm_WebResource
      WHERE v_edm_spatialResolution IS NOT NULL
