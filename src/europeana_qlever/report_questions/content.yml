name: Content Accessibility
description: Availability of content URLs and IIIF services, top MIME types and dc:type / dc:format labels.

questions:
  - id: content_availability
    question: "Availability of content URLs, IIIF, descriptions, creators, and subjects"
    backend: parquet
    query: |
      SELECT count(*) AS total,
             count(*) FILTER (WHERE x_has_content_url) AS has_content_url,
             round(count(*) FILTER (WHERE x_has_content_url) * 100.0 / count(*), 2) AS has_content_url_pct,
             count(*) FILTER (WHERE x_has_iiif) AS has_iiif_service,
             round(count(*) FILTER (WHERE x_has_iiif) * 100.0 / count(*), 2) AS has_iiif_service_pct,
             count(*) FILTER (WHERE x_has_description) AS has_description,
             round(count(*) FILTER (WHERE x_has_description) * 100.0 / count(*), 2) AS has_description_pct,
             count(*) FILTER (WHERE x_has_creator) AS has_creator,
             round(count(*) FILTER (WHERE x_has_creator) * 100.0 / count(*), 2) AS has_creator_pct,
             count(*) FILTER (WHERE x_has_subject) AS has_subject,
             round(count(*) FILTER (WHERE x_has_subject) * 100.0 / count(*), 2) AS has_subject_pct
      FROM group_items

  - id: top_mime_types
    question: "Top 15 MIME types across web resources"
    backend: parquet
    query: |
      SELECT v_ebucore_hasMimeType AS mime_type,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM values_edm_WebResource
      WHERE v_ebucore_hasMimeType IS NOT NULL
      GROUP BY v_ebucore_hasMimeType
      ORDER BY count DESC
      LIMIT 15

  - id: top_dc_types
    question: "Top 20 dc:type values by occurrence (resolved against skos:Concept labels)"
    backend: parquet
    query: |
      SELECT COALESCE(c.v_skos_prefLabel, l.x_value) AS dc_type,
             count(*) AS occurrences,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM links_ore_Proxy l
      LEFT JOIN values_skos_Concept c
        ON l.x_value_is_iri AND l.x_value = c.k_iri AND c.x_prefLabel_lang = 'en'
      WHERE l.x_property = 'v_dc_type'
      GROUP BY dc_type
      ORDER BY occurrences DESC
      LIMIT 20

  - id: top_formats
    question: "Top 20 dc:format values by occurrence"
    backend: parquet
    query: |
      SELECT COALESCE(c.v_skos_prefLabel, l.x_value) AS format,
             count(*) AS occurrences,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM links_ore_Proxy l
      LEFT JOIN values_skos_Concept c
        ON l.x_value_is_iri AND l.x_value = c.k_iri AND c.x_prefLabel_lang = 'en'
      WHERE l.x_property = 'v_dc_format'
      GROUP BY format
      ORDER BY occurrences DESC
      LIMIT 20
