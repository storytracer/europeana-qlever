name: Language Coverage
description: Language distribution of items and multilingual metadata coverage (from links_ore_Proxy).

questions:
  - id: primary_language_distribution
    question: "Top 30 primary languages by item count (from group_items.x_primary_language)"
    backend: parquet
    query: |
      SELECT x_primary_language AS language,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM group_items
      WHERE x_primary_language IS NOT NULL
      GROUP BY x_primary_language
      ORDER BY count DESC
      LIMIT 30

  - id: top_dc_languages
    question: "Top 30 dc:language values by occurrence (links_ore_Proxy rows)"
    backend: parquet
    query: |
      SELECT l.x_value AS language,
             count(*) AS occurrences,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM links_ore_Proxy l
      WHERE l.x_property = 'v_dc_language'
      GROUP BY l.x_value
      ORDER BY occurrences DESC
      LIMIT 30

  - id: multilingual_titles
    question: "Item share with provider-proxy titles in 2 / 3 / 5+ distinct language tags"
    backend: parquet
    query: |
      WITH title_rows AS (
          SELECT p.k_iri_cho AS k_iri,
                 l.x_value_lang AS lang
          FROM links_ore_Proxy l
          JOIN values_ore_Proxy p ON l.k_iri = p.k_iri
          WHERE l.x_property = 'v_dc_title'
            AND (p.v_edm_europeanaProxy IS NULL OR p.v_edm_europeanaProxy != 'true')
            AND l.x_value_lang IS NOT NULL
            AND l.x_value_lang != ''
      ),
      per_item AS (
          SELECT k_iri, count(DISTINCT lang) AS lang_count
          FROM title_rows
          GROUP BY k_iri
      )
      SELECT (SELECT count(*) FROM group_items) AS total_items,
             count(*) FILTER (WHERE lang_count >= 2) AS items_2plus_langs,
             round(count(*) FILTER (WHERE lang_count >= 2) * 100.0 / (SELECT count(*) FROM group_items), 2) AS pct_2plus,
             count(*) FILTER (WHERE lang_count >= 3) AS items_3plus_langs,
             round(count(*) FILTER (WHERE lang_count >= 3) * 100.0 / (SELECT count(*) FROM group_items), 2) AS pct_3plus,
             count(*) FILTER (WHERE lang_count >= 5) AS items_5plus_langs,
             round(count(*) FILTER (WHERE lang_count >= 5) * 100.0 / (SELECT count(*) FROM group_items), 2) AS pct_5plus
      FROM per_item

  - id: multi_language_items
    question: "Item share declaring 2 or more distinct dc:language values on the provider proxy"
    backend: parquet
    query: |
      WITH lang_rows AS (
          SELECT p.k_iri_cho AS k_iri, l.x_value AS lang
          FROM links_ore_Proxy l
          JOIN values_ore_Proxy p ON l.k_iri = p.k_iri
          WHERE l.x_property = 'v_dc_language'
            AND (p.v_edm_europeanaProxy IS NULL OR p.v_edm_europeanaProxy != 'true')
      ),
      per_item AS (
          SELECT k_iri, count(DISTINCT lang) AS n_langs
          FROM lang_rows
          GROUP BY k_iri
      )
      SELECT count(*) AS items_with_language,
             count(*) FILTER (WHERE n_langs >= 2) AS items_with_2plus,
             round(count(*) FILTER (WHERE n_langs >= 2) * 100.0 / count(*), 2) AS pct_2plus,
             count(*) FILTER (WHERE n_langs >= 3) AS items_with_3plus,
             round(count(*) FILTER (WHERE n_langs >= 3) * 100.0 / count(*), 2) AS pct_3plus
      FROM per_item
