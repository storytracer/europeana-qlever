name: Volume and Composition
description: Overall dataset size, type distribution, and leading institutions and aggregators.

questions:
  - id: total_items
    question: "How many items are there in total?"
    backend: parquet
    query: |
      SELECT count(*) AS total_items FROM group_items

  - id: by_type
    question: "Item distribution by edm:type"
    backend: parquet
    query: |
      SELECT v_edm_type AS type,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM group_items
      GROUP BY v_edm_type
      ORDER BY count DESC

  - id: top_countries
    question: "Top 20 providing countries by item count"
    backend: parquet
    query: |
      SELECT v_edm_country AS country,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM group_items
      GROUP BY v_edm_country
      ORDER BY count DESC
      LIMIT 20

  - id: top_institutions
    question: "Top 20 data provider institutions by item count"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_dataProvider) AS institution,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_dataProvider = o.k_iri
      GROUP BY 1
      ORDER BY count DESC
      LIMIT 20

  - id: top_aggregators
    question: "Top 20 aggregators by item count"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_provider) AS aggregator,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_provider = o.k_iri
      GROUP BY 1
      ORDER BY count DESC
      LIMIT 20
