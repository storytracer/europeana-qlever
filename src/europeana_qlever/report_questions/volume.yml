name: Volume and Composition
description: Overall dataset size, type distribution, and top providers.

questions:
  - id: total_items
    question: "How many items are there in total?"
    backend: parquet
    query: |
      SELECT count(*) AS total_items FROM items

  - id: by_type
    question: "Distribution of items by edm:type"
    backend: parquet
    query: |
      SELECT type,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM items
      GROUP BY type
      ORDER BY count DESC

  - id: top_countries
    question: "Top 20 providing countries by item count"
    backend: parquet
    query: |
      SELECT country,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM items
      GROUP BY country
      ORDER BY count DESC
      LIMIT 20

  - id: top_institutions
    question: "Top 20 data provider institutions by item count"
    backend: parquet
    query: |
      SELECT COALESCE(n.name, i.institution) AS institution,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM items i
      LEFT JOIN org_names n ON i.institution = n.org
      GROUP BY 1
      ORDER BY count DESC
      LIMIT 20

  - id: top_aggregators
    question: "Top 20 aggregators by item count"
    backend: parquet
    query: |
      SELECT COALESCE(n.name, i.aggregator) AS aggregator,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM items i
      LEFT JOIN org_names n ON i.aggregator = n.org
      GROUP BY 1
      ORDER BY count DESC
      LIMIT 20

  - id: distinct_datasets
    question: "How many distinct dataset names are there?"
    backend: parquet
    query: |
      SELECT count(DISTINCT dataset_name) AS distinct_datasets
      FROM items
      WHERE dataset_name IS NOT NULL

  - id: top_dc_types
    question: "Top 20 dc:type labels by item count"
    backend: parquet
    query: |
      SELECT d.label AS dc_type,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM (SELECT UNNEST(dc_types) AS d FROM items)
      WHERE d.label IS NOT NULL
      GROUP BY d.label
      ORDER BY count DESC
      LIMIT 20

  - id: top_formats
    question: "Top 20 dc:format labels by item count"
    backend: parquet
    query: |
      SELECT f.label AS format,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM (SELECT UNNEST(formats) AS f FROM items)
      WHERE f.label IS NOT NULL
      GROUP BY f.label
      ORDER BY count DESC
      LIMIT 20
