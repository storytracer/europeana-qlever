name: Metadata Completeness
description: Completeness score distribution, per-field coverage, and how completeness relates to type and openness.

questions:
  - id: completeness_distribution
    question: "Distribution of completeness scores"
    backend: parquet
    query: |
      SELECT v_edm_completeness AS score,
             count(*) AS count,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM group_items
      GROUP BY v_edm_completeness
      ORDER BY v_edm_completeness

  - id: field_coverage
    question: "Per-field coverage percentages"
    backend: parquet
    query: |
      SELECT count(*) AS total_items,
             round(count(*) FILTER (WHERE x_dc_title IS NOT NULL AND len(x_dc_title) > 0) * 100.0 / count(*), 2) AS has_title,
             round(count(*) FILTER (WHERE x_dc_description IS NOT NULL AND len(x_dc_description) > 0) * 100.0 / count(*), 2) AS has_description,
             round(count(*) FILTER (WHERE x_dc_creator IS NOT NULL AND len(x_dc_creator) > 0) * 100.0 / count(*), 2) AS has_creator,
             round(count(*) FILTER (WHERE x_dc_contributor IS NOT NULL AND len(x_dc_contributor) > 0) * 100.0 / count(*), 2) AS has_contributor,
             round(count(*) FILTER (WHERE x_dc_publisher IS NOT NULL AND len(x_dc_publisher) > 0) * 100.0 / count(*), 2) AS has_publisher,
             round(count(*) FILTER (WHERE x_dc_subject IS NOT NULL AND len(x_dc_subject) > 0) * 100.0 / count(*), 2) AS has_subject,
             round(count(*) FILTER (WHERE x_dc_type IS NOT NULL AND len(x_dc_type) > 0) * 100.0 / count(*), 2) AS has_dc_type,
             round(count(*) FILTER (WHERE x_dc_format IS NOT NULL AND len(x_dc_format) > 0) * 100.0 / count(*), 2) AS has_format,
             round(count(*) FILTER (WHERE x_dc_date IS NOT NULL AND len(x_dc_date) > 0) * 100.0 / count(*), 2) AS has_date,
             round(count(*) FILTER (WHERE x_edm_year IS NOT NULL AND len(x_edm_year) > 0) * 100.0 / count(*), 2) AS has_year,
             round(count(*) FILTER (WHERE x_dc_language IS NOT NULL AND len(x_dc_language) > 0) * 100.0 / count(*), 2) AS has_language,
             round(count(*) FILTER (WHERE x_dc_identifier IS NOT NULL AND len(x_dc_identifier) > 0) * 100.0 / count(*), 2) AS has_identifier,
             round(count(*) FILTER (WHERE v_edm_isShownBy IS NOT NULL) * 100.0 / count(*), 2) AS has_content_url,
             round(count(*) FILTER (WHERE x_has_iiif) * 100.0 / count(*), 2) AS has_iiif
      FROM merged_items

  - id: completeness_by_type
    question: "Average completeness score by edm:type"
    backend: parquet
    query: |
      SELECT v_edm_type AS type,
             count(*) AS items,
             round(avg(v_edm_completeness), 2) AS avg_completeness,
             min(v_edm_completeness) AS min_score,
             max(v_edm_completeness) AS max_score
      FROM group_items
      WHERE v_edm_completeness IS NOT NULL
      GROUP BY v_edm_type
      ORDER BY avg_completeness DESC

  - id: completeness_by_reuse_level
    question: "Average completeness score by reuse level"
    backend: parquet
    query: |
      SELECT x_reuse_level AS reuse_level,
             count(*) AS items,
             round(avg(v_edm_completeness), 2) AS avg_completeness,
             quantile_cont(v_edm_completeness, 0.5) AS median_score,
             quantile_cont(v_edm_completeness, 0.9) AS p90_score
      FROM group_items
      WHERE v_edm_completeness IS NOT NULL
      GROUP BY x_reuse_level
      ORDER BY avg_completeness DESC
