name: Temporal Coverage
description: How item content maps across centuries and decades via edm:year, and where temporal coverage is missing.

questions:
  - id: items_per_century
    question: "Items by century (from the first value of edm:year)"
    backend: parquet
    query: |
      WITH years AS (
          SELECT k_iri,
                 TRY_CAST(x_edm_year[1] AS INTEGER) AS year
          FROM merged_items
          WHERE x_edm_year IS NOT NULL AND len(x_edm_year) > 0
      )
      SELECT CASE
                 WHEN year IS NULL THEN 'unparseable'
                 WHEN year < 0 THEN 'BCE'
                 WHEN year = 0 THEN '0'
                 ELSE CAST(((year - 1) / 100 + 1) AS VARCHAR) || 'th century CE'
             END AS century,
             count(*) AS items,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM years
      GROUP BY century
      ORDER BY
          CASE century WHEN 'BCE' THEN -2 WHEN '0' THEN -1 WHEN 'unparseable' THEN 999 ELSE TRY_CAST(split_part(century, 'th', 1) AS INTEGER) END

  - id: items_per_decade_modern
    question: "Items per decade from 1800 onwards"
    backend: parquet
    query: |
      WITH years AS (
          SELECT TRY_CAST(x_edm_year[1] AS INTEGER) AS year
          FROM merged_items
          WHERE x_edm_year IS NOT NULL AND len(x_edm_year) > 0
      )
      SELECT (year / 10) * 10 AS decade,
             count(*) AS items,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct
      FROM years
      WHERE year >= 1800 AND year <= 2099
      GROUP BY decade
      ORDER BY decade

  - id: year_coverage_by_type
    question: "Missing edm:year coverage by edm:type"
    backend: parquet
    query: |
      SELECT m.v_edm_type AS type,
             count(*) AS total,
             count(*) FILTER (WHERE m.x_edm_year IS NOT NULL AND len(m.x_edm_year) > 0) AS with_year,
             round(count(*) FILTER (WHERE m.x_edm_year IS NOT NULL AND len(m.x_edm_year) > 0) * 100.0 / count(*), 2) AS pct_with_year,
             count(*) - count(*) FILTER (WHERE m.x_edm_year IS NOT NULL AND len(m.x_edm_year) > 0) AS missing_year
      FROM merged_items m
      GROUP BY m.v_edm_type
      ORDER BY total DESC

  - id: type_mix_by_century
    question: "Type composition per century"
    backend: parquet
    query: |
      WITH years AS (
          SELECT k_iri,
                 v_edm_type,
                 TRY_CAST(x_edm_year[1] AS INTEGER) AS year
          FROM merged_items
          WHERE x_edm_year IS NOT NULL AND len(x_edm_year) > 0
      )
      SELECT CASE
                 WHEN year IS NULL OR year < 1 THEN 'other'
                 ELSE CAST(((year - 1) / 100 + 1) AS VARCHAR) || 'th'
             END AS century,
             v_edm_type AS type,
             count(*) AS items,
             round(count(*) * 100.0 / sum(count(*)) OVER (PARTITION BY CASE
                 WHEN year IS NULL OR year < 1 THEN 'other'
                 ELSE CAST(((year - 1) / 100 + 1) AS VARCHAR) || 'th'
             END), 2) AS pct_within_century
      FROM years
      WHERE year IS NOT NULL AND year >= 1 AND year <= 2099
      GROUP BY century, v_edm_type
      ORDER BY century, items DESC

  - id: reuse_by_century
    question: "Reuse-level mix per century (1500 onwards)"
    backend: parquet
    query: |
      WITH items AS (
          SELECT g.x_reuse_level,
                 TRY_CAST(m.x_edm_year[1] AS INTEGER) AS year
          FROM merged_items m
          JOIN group_items g ON m.k_iri = g.k_iri
          WHERE m.x_edm_year IS NOT NULL AND len(m.x_edm_year) > 0
      )
      SELECT CAST(((year - 1) / 100 + 1) AS VARCHAR) || 'th' AS century,
             count(*) AS items,
             round(count(*) FILTER (WHERE x_reuse_level = 'open') * 100.0 / count(*), 2) AS pct_open,
             round(count(*) FILTER (WHERE x_reuse_level = 'restricted') * 100.0 / count(*), 2) AS pct_restricted,
             round(count(*) FILTER (WHERE x_reuse_level = 'prohibited') * 100.0 / count(*), 2) AS pct_prohibited
      FROM items
      WHERE year IS NOT NULL AND year >= 1500 AND year <= 2099
      GROUP BY century
      ORDER BY TRY_CAST(replace(century, 'th', '') AS INTEGER)
