name: Provider Leaderboards
description: Institution rankings by volume, openness, IIIF adoption, and metadata completeness.

questions:
  - id: top_by_volume
    question: "Top 20 institutions by total item count"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_dataProvider) AS institution,
             count(*) AS items,
             round(count(*) * 100.0 / sum(count(*)) OVER (), 2) AS pct_of_all
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_dataProvider = o.k_iri
      WHERE g.v_edm_dataProvider IS NOT NULL
      GROUP BY 1
      ORDER BY items DESC
      LIMIT 20

  - id: top_by_open_absolute
    question: "Top 20 institutions by absolute count of openly reusable items"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_dataProvider) AS institution,
             count(*) FILTER (WHERE g.x_reuse_level = 'open') AS open_items,
             count(*) AS total_items,
             round(count(*) FILTER (WHERE g.x_reuse_level = 'open') * 100.0 / count(*), 2) AS pct_open
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_dataProvider = o.k_iri
      WHERE g.v_edm_dataProvider IS NOT NULL
      GROUP BY 1
      HAVING count(*) FILTER (WHERE g.x_reuse_level = 'open') > 0
      ORDER BY open_items DESC
      LIMIT 20

  - id: top_by_open_share
    question: "Top 20 institutions by % of open items (min 1,000 items)"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_dataProvider) AS institution,
             count(*) AS total_items,
             count(*) FILTER (WHERE g.x_reuse_level = 'open') AS open_items,
             round(count(*) FILTER (WHERE g.x_reuse_level = 'open') * 100.0 / count(*), 2) AS pct_open
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_dataProvider = o.k_iri
      WHERE g.v_edm_dataProvider IS NOT NULL
      GROUP BY 1
      HAVING count(*) >= 1000
      ORDER BY pct_open DESC, total_items DESC
      LIMIT 20

  - id: top_by_iiif_adoption
    question: "Top 20 institutions by IIIF adoption rate (min 1,000 items)"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_dataProvider) AS institution,
             count(*) AS total_items,
             count(*) FILTER (WHERE g.x_has_iiif) AS iiif_items,
             round(count(*) FILTER (WHERE g.x_has_iiif) * 100.0 / count(*), 2) AS pct_iiif
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_dataProvider = o.k_iri
      WHERE g.v_edm_dataProvider IS NOT NULL
      GROUP BY 1
      HAVING count(*) >= 1000 AND count(*) FILTER (WHERE g.x_has_iiif) > 0
      ORDER BY pct_iiif DESC, total_items DESC
      LIMIT 20

  - id: bottom_by_completeness
    question: "Bottom 20 institutions by average completeness score (min 10,000 items)"
    backend: parquet
    query: |
      SELECT COALESCE(o.name, g.v_edm_dataProvider) AS institution,
             count(*) AS total_items,
             round(avg(g.v_edm_completeness), 2) AS avg_completeness,
             quantile_cont(g.v_edm_completeness, 0.5) AS median_score
      FROM group_items g
      LEFT JOIN orgs o ON g.v_edm_dataProvider = o.k_iri
      WHERE g.v_edm_dataProvider IS NOT NULL AND g.v_edm_completeness IS NOT NULL
      GROUP BY 1
      HAVING count(*) >= 10000
      ORDER BY avg_completeness ASC, total_items DESC
      LIMIT 20
